<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Booster Blitz Board</title>
  <style>
    :root{
      --bg:#08090d;
      --bg2:#11141a;
      --panel:#141820;
      --line:rgba(255,255,255,.08);
      --text:#f4f6fb;
      --muted:#97a0b1;
      --hot:#ff4d8d;
      --hot2:#ff7daf;
      --blue:#5ea7ff;
      --green:#57d48a;
      --gold:#efc86a;
      --red:#ff6767;
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --radius:22px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,77,141,.22), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(94,167,255,.12), transparent 24%),
        linear-gradient(180deg,#0a0c11,#06070a 70%);
      overflow:hidden;
    }
    .app{
      height:100%;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px 10px;
    }
    .title{
      font-size:1rem;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#fff;
    }
    .title span{color:var(--hot)}
    .steps{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .step-dot{
      width:12px;height:12px;border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.08);
      transition:.2s ease;
    }
    .step-dot.active{background:var(--hot); box-shadow:0 0 0 4px rgba(255,77,141,.14)}
    .screen-wrap{
      position:relative;
      flex:1 1 auto;
      min-height:0;
      padding:0 12px 12px;
    }
    .screen{
      position:absolute;
      inset:0 12px 12px;
      display:none;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg,rgba(17,20,26,.92),rgba(10,12,16,.96));
      box-shadow:var(--shadow);
    }
    .screen.active{display:block}
    .center{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card-panel{
      width:min(520px,100%);
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:22px;
      box-shadow:var(--shadow);
    }
    .eyebrow{
      color:var(--hot2);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:.78rem;
      font-weight:900;
      margin-bottom:8px;
    }
    h1,h2,h3,p{margin:0}
    .big{
      font-size:clamp(1.7rem,5vw,2.8rem);
      line-height:1;
      margin-bottom:12px;
      font-weight:900;
    }
    .muted{color:var(--muted)}
    .set-select{
      margin-top:18px;
      display:grid;
      gap:12px;
    }
    .select-shell{
      display:flex;
      gap:10px;
      align-items:center;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
    }
    select,button,input{
      font:inherit;
      border:none;
      outline:none;
    }
    select{
      width:100%;
      background:transparent;
      color:var(--text);
      font-size:1rem;
    }
    option{color:#111}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap}
    button{
      cursor:pointer;
      border-radius:16px;
      padding:14px 16px;
      font-weight:800;
      letter-spacing:.02em;
      transition:transform .15s ease, opacity .15s ease, background .15s ease;
    }
    button:active{transform:scale(.98)}
    .btn-hot{background:linear-gradient(135deg,var(--hot),var(--hot2));color:#13070d}
    .btn-soft{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.08)}
    .btn-blue{background:linear-gradient(135deg,#71b4ff,#4e91f1);color:#051425}
    .btn-green{background:linear-gradient(135deg,#67e29a,#39c775);color:#042312}
    .btn-red{background:linear-gradient(135deg,#ff8b8b,#ff6363);color:#2d0909}
    .full{width:100%}
    .tiny{
      font-size:.82rem;
      padding:10px 12px;
      border-radius:14px;
    }

    .reveal-screen{
      min-height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:14px;
      padding:16px;
    }
    .reveal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .progress-pill{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-weight:800;
    }
    .reveal-stage{
      min-height:0;
      display:grid;
      place-items:center;
      padding:10px;
    }
    .card-stack{
      position:relative;
      width:min(92vw,330px);
      aspect-ratio:63/88;
    }
    .stack-back,.stack-back2{
      position:absolute;
      inset:0;
      border-radius:22px;
      background:linear-gradient(180deg,#25111a,#12151c);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:var(--shadow);
    }
    .stack-back{transform:translate(-10px,10px) rotate(-5deg)}
    .stack-back2{transform:translate(10px,10px) rotate(5deg)}
    .reveal-card{
      position:absolute;
      inset:0;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
      background:#0d1017;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .reveal-card img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .reveal-name{
      margin-top:12px;
      text-align:center;
      font-size:1rem;
      font-weight:800;
    }

    .build-screen{
      min-height:100%;
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:14px;
      padding:16px;
    }
    .build-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .piles{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      align-content:start;
    }
    .pile{
      min-height:230px;
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:12px;
      display:grid;
      gap:10px;
      align-content:start;
    }
    .pile-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .pile-name{
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
    }
    .pill-count{
      min-width:34px;
      height:34px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      font-weight:900;
    }
    .pile-drop{
      min-height:160px;
      display:grid;
      place-items:center;
      border-radius:18px;
      padding:10px;
      border:1px dashed rgba(255,255,255,.12);
      background:rgba(255,255,255,.02);
      overflow:hidden;
    }
    .mini-card{
      width:min(34vw,142px);
      aspect-ratio:63/88;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
      background:#0d1017;
      box-shadow:0 10px 28px rgba(0,0,0,.28);
      position:relative;
      flex:0 0 auto;
    }
    .mini-card img{
      width:100%; height:100%; object-fit:cover; display:block;
      pointer-events:none;
    }
    .mini-card.selected{
      outline:3px solid rgba(255,77,141,.95);
      transform:translateY(-4px);
      box-shadow:0 0 0 4px rgba(255,77,141,.18), 0 16px 30px rgba(0,0,0,.35);
    }
    .pile-preview{
      position:relative;
      width:min(34vw,142px);
      aspect-ratio:63/88;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
      background:#0d1017;
      box-shadow:0 12px 28px rgba(0,0,0,.32);
    }
    .pile-preview img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
    }
    .pile-empty{
      color:rgba(255,255,255,.42);
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:.82rem;
      font-weight:900;
    }
    .pile-top-tag{
      position:absolute;
      left:8px;
      right:8px;
      bottom:8px;
      border-radius:999px;
      padding:6px 10px;
      background:rgba(10,12,16,.8);
      border:1px solid rgba(255,255,255,.08);
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      text-align:center;
      font-weight:900;
      backdrop-filter:blur(4px);
    }
    .pile-drop.active-target,
    .tray-grid.active-target{
      border-color:rgba(255,77,141,.9);
      box-shadow:inset 0 0 0 2px rgba(255,77,141,.22);
      background:rgba(255,77,141,.05);
    }
    .tray{
      background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:12px;
      display:grid;
      gap:10px;
    }
    .tray-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }
    .tray-grid{
      display:flex;
      flex-wrap:nowrap;
      gap:12px;
      min-height:188px;
      overflow-x:auto;
      overflow-y:hidden;
      padding:2px 2px 8px;
      scroll-snap-type:x proximity;
    }
    .tray-grid .mini-card{
      scroll-snap-align:start;
    }

    .pick-screen{
      min-height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:18px;
      padding:20px;
    }
    .pick-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .face-pile{
      min-height:190px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.02)),
        repeating-linear-gradient(135deg, rgba(255,77,141,.14), rgba(255,77,141,.14) 10px, rgba(255,255,255,.03) 10px, rgba(255,255,255,.03) 20px);
      box-shadow:var(--shadow);
      display:grid;
      place-items:center;
      text-align:center;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:1.15rem;
      color:#fff;
    }
    .face-pile.used{
      opacity:.35;
      filter:grayscale(1);
    }
    .face-pile span{
      display:block;
      margin-top:10px;
      font-size:.82rem;
      color:var(--muted);
      letter-spacing:.12em;
    }

    .play-screen{
      min-height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:12px;
      padding:12px;
    }
    .hud{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
    }
    .hud-left{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .tracker{
      display:flex;
      align-items:center;
      gap:8px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:8px;
    }
    .tracker-label{
      font-size:.76rem;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:900;
      min-width:40px;
    }
    .tracker-value{
      min-width:40px;
      text-align:center;
      font-size:1.4rem;
      font-weight:900;
    }
    .pm{
      width:38px;
      height:38px;
      padding:0;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      font-size:1.2rem;
    }
    .battlefield-wrap{
      position:relative;
      min-height:0;
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at center, rgba(255,255,255,.03), transparent 40%),
        linear-gradient(180deg,#1b1f27,#11141b 55%, #0c0f14 100%);
    }
    .battlefield{
      position:absolute;
      inset:0;
      overflow:hidden;
    }
    .battlefield::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size:38px 38px;
      opacity:.35;
      pointer-events:none;
    }
    .zone-label{
      position:absolute;
      left:16px;
      top:12px;
      font-size:.76rem;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:rgba(255,255,255,.45);
      font-weight:900;
      z-index:1;
    }
    .board-card{
      position:absolute;
      width:min(28vw,160px);
      max-width:160px;
      min-width:98px;
      aspect-ratio:63/88;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 18px 36px rgba(0,0,0,.4);
      background:#0d1017;
      touch-action:none;
      user-select:none;
    }
    .board-card.selected-card{
      outline:3px solid rgba(255,77,141,.9);
      box-shadow:0 0 0 4px rgba(255,77,141,.18), 0 18px 36px rgba(0,0,0,.4);
    }
    .board-card.tapped{
      transform:rotate(90deg);
      transform-origin:center center;
    }
    .board-card img{
      width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;
    }
    .token-face{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      padding:12px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.12), transparent 35%),
        linear-gradient(180deg,#3b2f63,#1c1930 52%,#10131c);
      color:#fff;
      pointer-events:none;
    }
    .token-face .token-title{
      font-weight:900;
      font-size:1rem;
      line-height:1.05;
      text-shadow:0 2px 8px rgba(0,0,0,.45);
    }
    .token-face .token-type{
      font-size:.68rem;
      text-transform:uppercase;
      letter-spacing:.16em;
      opacity:.78;
      font-weight:800;
    }
    .token-face .token-pt{
      align-self:flex-end;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(8,10,14,.65);
      border:1px solid rgba(255,255,255,.12);
      font-weight:900;
      font-size:.82rem;
    }
    .flip-pill{
      position:absolute;
      left:8px;
      top:8px;
      height:24px;
      min-width:24px;
      padding:0 7px;
      border-radius:999px;
      display:none;
      place-items:center;
      background:rgba(20,24,32,.92);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.78rem;
      font-weight:900;
      pointer-events:none;
    }
    .flip-pill.show{display:grid}
    .card-badge{
      position:absolute;
      right:8px; top:8px;
      min-width:28px; height:28px;
      padding:0 8px;
      border-radius:999px;
      display:none;
      place-items:center;
      background:rgba(20,24,32,.92);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.82rem;
      font-weight:900;
      pointer-events:none;
    }
    .card-badge.show{display:grid}
    .counter-chip{
      position:absolute;
      width:64px;height:64px;border-radius:999px;
      background:linear-gradient(180deg,#2b3444,#1c2431);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      box-shadow:0 18px 36px rgba(0,0,0,.35);
      display:grid;
      place-items:center;
      font-weight:900;
      touch-action:none;
      user-select:none;
    }
    .counter-chip.selected-counter{
      outline:3px solid rgba(255,77,141,.9);
      box-shadow:0 0 0 4px rgba(255,77,141,.18), 0 18px 36px rgba(0,0,0,.35);
    }
    .counter-chip small{
      position:absolute;
      bottom:8px;
      font-size:.6rem;
      letter-spacing:.12em;
      opacity:.7;
      text-transform:uppercase;
    }
    .controls-bottom{
      display:grid;
      gap:10px;
    }
    .selection-bar{
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:10px 12px;
    }
    .selection-bar.active{display:flex}
    .selection-bar .name{
      font-weight:800;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .counter-tray{
      display:none;
      gap:10px;
      flex-wrap:wrap;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:10px;
    }
    .counter-tray.active{display:flex}
    .ghost{
      opacity:.5;
      outline:2px dashed rgba(255,255,255,.3);
    }
    .loading{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-weight:700;
    }
    .spinner{
      width:16px;height:16px;border-radius:999px;
      border:2px solid rgba(255,255,255,.14);
      border-top-color:var(--hot);
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    @media (max-width:760px){
      .screen{inset:0 10px 10px}
      .topbar{padding:12px 12px 8px}
      .pick-grid,.piles{grid-template-columns:1fr}
      .hud{grid-template-columns:1fr; gap:8px}
      .hud-left{justify-content:space-between}
      .board-card{width:min(31vw,138px)}
      .mini-card,.pile-preview{width:min(42vw,132px)}
      .selection-bar{flex-direction:column; align-items:stretch}
      .reveal-screen,.build-screen,.pick-screen,.play-screen{padding:12px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">Booster <span>Blitz</span></div>
    <div class="steps" id="steps"></div>
  </div>

  <div class="screen-wrap">
    <section class="screen active" id="screen-set">
      <div class="center">
        <div class="card-panel">
          <div class="eyebrow">Step 1</div>
          <div class="big">Pick a set.<br>Open a pack.</div>
          <p class="muted">Single-player sideboard. Your friend handles their own device.</p>
          <div class="set-select">
            <div class="select-shell">
              <select id="setSelect">
                <option>Loading sets...</option>
              </select>
            </div>
            <div class="btn-row">
              <button class="btn-soft" id="refreshSetsBtn">Refresh Sets</button>
              <button class="btn-hot" id="openPackBtn">Open 12 Cards</button>
            </div>
            <div id="setStatus" class="loading"><span class="spinner"></span><span>Loading released sets...</span></div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-reveal">
      <div class="reveal-screen">
        <div class="reveal-top">
          <div>
            <div class="eyebrow">Step 2</div>
            <h2>Open the pack</h2>
          </div>
          <div class="progress-pill" id="revealProgress">1 / 12</div>
        </div>
        <div class="reveal-stage">
          <div>
            <div class="card-stack">
              <div class="stack-back"></div>
              <div class="stack-back2"></div>
              <div class="reveal-card" id="revealCard"></div>
            </div>
            <div class="reveal-name" id="revealName"></div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-soft" id="skipRevealBtn">Skip</button>
          <button class="btn-hot" id="nextRevealBtn">Next Card</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-build">
      <div class="build-screen">
        <div class="build-top">
          <div>
            <div class="eyebrow">Step 3</div>
            <h2>Build 4 piles</h2>
          </div>
          <button class="btn-green" id="lockPilesBtn">Lock Piles</button>
        </div>

        <div class="tray">
          <div class="tray-head">
            <strong>Cards</strong>
            <span class="muted" id="unsortedCount">12 left</span>
          </div>
          <div class="tray-grid" id="trayGrid"></div>
        </div>

        <div class="piles" id="piles"></div>
      </div>
    </section>

    <section class="screen" id="screen-pick">
      <div class="pick-screen">
        <div>
          <div class="eyebrow">Step 4</div>
          <h2>Pick the pile your opponent chose for you</h2>
        </div>
        <div class="pick-grid" id="pickGrid"></div>
        <div class="btn-row">
          <button class="btn-soft" id="backToBuildBtn">Back to Piles</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-play">
      <div class="play-screen">
        <div class="hud">
          <div class="hud-left">
            <div class="tracker">
              <div class="tracker-label">Life</div>
              <button class="pm" id="lifeMinus">−</button>
              <div class="tracker-value" id="lifeValue">5</div>
              <button class="pm" id="lifePlus">+</button>
            </div>
            <div class="tracker">
              <div class="tracker-label">Match</div>
              <button class="pm" id="matchMinus">−</button>
              <div class="tracker-value" id="matchValue">0</div>
              <button class="pm" id="matchPlus">+</button>
            </div>
          </div>
          <button class="btn-soft tiny" id="toggleTrayBtn">Counters</button>
          <button class="btn-soft tiny" id="backToPickBtn">Piles</button>
        </div>

        <div class="battlefield-wrap">
          <div class="battlefield" id="battlefield">
            <div class="zone-label">Battlefield</div>
          </div>
        </div>

        <div class="controls-bottom">
          <div class="selection-bar" id="selectionBar">
            <div class="name" id="selectionName">Selected</div>
            <div class="btn-row">
              <button class="btn-soft tiny" id="selectedMinus">−1</button>
              <button class="btn-soft tiny" id="selectedPlus">+1</button>
              <button class="btn-soft tiny" id="selectedFlip">Flip</button>
              <button class="btn-red tiny" id="selectedDelete">Delete</button>
            </div>
          </div>

          <div class="counter-tray" id="counterTray">
            <button class="btn-soft tiny" id="addCounterBtn">Add Counter</button>
            <button class="btn-soft tiny" id="addPlusOneBtn">Add +1/+1</button>
            <button class="btn-soft tiny" id="addTokenBtn">Add Token</button>
            <button class="btn-soft tiny" id="resetBoardBtn">Reset Board</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
const stepIds = ["screen-set","screen-reveal","screen-build","screen-pick","screen-play"];
const state = {
  currentScreen: "screen-set",
  sets: [],
  selectedSetCode: "",
  selectedSetName: "",
  pack: [],
  revealIndex: 0,
  cardZone: {},
  piles: [[],[],[],[]],
  usedPiles: [],
  activePileIndex: null,
  life: 5,
  match: 0,
  boardCards: [],
  looseCounters: [],
  selectedEntity: null,
  trayOpen: false,
  z: 10,
  cardsCache: {},
  selectedBuildCard: null,
  tokenCounter: 1
};

const $ = (id) => document.getElementById(id);

function initSteps(){
  const wrap = $("steps");
  wrap.innerHTML = stepIds.map((id,i)=>`<div class="step-dot ${i===0?'active':''}" data-step="${id}"></div>`).join("");
}
function setStep(id){
  document.querySelectorAll(".step-dot").forEach(dot=>{
    dot.classList.toggle("active", dot.dataset.step === id);
  });
}
function showScreen(id){
  state.currentScreen = id;
  document.querySelectorAll(".screen").forEach(el=>el.classList.toggle("active", el.id === id));
  setStep(id);
  if(id === "screen-play"){
    setTimeout(positionBoardCardsIfNeeded, 30);
  }
}
function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n){
  return shuffle(arr).slice(0, n);
}
function imgForCard(card){
  return card.image_uris?.normal ||
         card.image_uris?.large ||
         card.card_faces?.find(f=>f.image_uris)?.image_uris?.normal ||
         card.card_faces?.find(f=>f.image_uris)?.image_uris?.large ||
         "";
}
function facesForCard(card){
  const faces = (card.card_faces || [])
    .filter(f => f.image_uris?.normal || f.image_uris?.large)
    .map(f => ({
      name: f.name || card.name,
      image: f.image_uris?.normal || f.image_uris?.large || "",
      type: f.type_line || card.type_line || "",
      oracle: f.oracle_text || ""
    }));
  if(faces.length) return faces;
  const image = imgForCard(card);
  return image ? [{
    name: card.name,
    image,
    type: card.type_line || "",
    oracle: card.oracle_text || ""
  }] : [];
}
function setStatus(message, spinning=true){
  $("setStatus").innerHTML = spinning
    ? `<span class="spinner"></span><span>${message}</span>`
    : `<span>${message}</span>`;
}
async function loadSets(){
  setStatus("Loading released sets...", true);
  const select = $("setSelect");
  select.innerHTML = `<option>Loading sets...</option>`;
  try{
    const res = await fetch("https://api.scryfall.com/sets");
    if(!res.ok) throw new Error("Could not load sets.");
    const json = await res.json();
    const blocked = new Set(["token","alchemy","memorabilia","minigame","funny","treasure_chest","arsenal","promo","scheme","planechase","vanguard"]);
    const sets = (json.data || [])
      .filter(s =>
        !s.digital &&
        s.released_at &&
        (s.card_count || 0) >= 12 &&
        !blocked.has(s.set_type)
      )
      .sort((a,b)=>{
        const da = a.released_at || "";
        const db = b.released_at || "";
        if(da !== db) return db.localeCompare(da);
        return a.name.localeCompare(b.name);
      });
    state.sets = sets;
    select.innerHTML = sets.map(s =>
      `<option value="${s.code}">${escapeHtml(s.name)} • ${s.code.toUpperCase()} • ${s.released_at}</option>`
    ).join("");
    if(sets.length){
      state.selectedSetCode = sets[0].code;
      state.selectedSetName = sets[0].name;
    }
    setStatus(`${sets.length} released sets loaded`, false);
  }catch(err){
    select.innerHTML = `<option>Could not load sets</option>`;
    setStatus("Could not load sets. Try refresh.", false);
  }
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
async function fetchSetCards(code){
  if(state.cardsCache[code]) return state.cardsCache[code];
  let url = `https://api.scryfall.com/cards/search?q=${encodeURIComponent(`e:${code} game:paper unique:cards -is:token`)}`;
  let all = [];
  let pages = 0;
  while(url && pages < 4){
    const res = await fetch(url);
    if(!res.ok) throw new Error("Could not load cards.");
    const json = await res.json();
    all.push(...(json.data || []));
    url = json.has_more ? json.next_page : null;
    pages++;
  }
  const cards = all
    .map(c => {
      const faces = facesForCard(c);
      return {
        id: c.id,
        name: c.name,
        image: faces[0]?.image || "",
        mana: c.mana_cost || "",
        type: c.type_line || "",
        oracle: c.oracle_text || "",
        rarity: c.rarity || "",
        faces,
        canFlip: faces.length > 1
      };
    })
    .filter(c => c.image);
  state.cardsCache[code] = cards;
  return cards;
}
async function openPack(){
  const code = $("setSelect").value;
  if(!code) return;
  const found = state.sets.find(s => s.code === code);
  state.selectedSetCode = code;
  state.selectedSetName = found?.name || code.toUpperCase();
  const btn = $("openPackBtn");
  const old = btn.textContent;
  btn.textContent = "Opening...";
  btn.disabled = true;
  try{
    const cards = await fetchSetCards(code);
    if(cards.length < 12) throw new Error("Not enough cards in that set.");
    state.pack = sample(cards, 12);
    state.revealIndex = 0;
    state.cardZone = {};
    state.piles = [[],[],[],[]];
    state.usedPiles = [];
    state.activePileIndex = null;
    state.boardCards = [];
    state.looseCounters = [];
    state.selectedEntity = null;
    state.selectedBuildCard = null;
    state.life = 5;
    state.match = 0;
    state.tokenCounter = 1;
    state.pack.forEach(c => state.cardZone[c.id] = "tray");
    renderReveal();
    renderBuild();
    renderPick();
    renderTrackers();
    showScreen("screen-reveal");
  }catch(err){
    alert(err.message || "Could not open pack.");
  }finally{
    btn.textContent = old;
    btn.disabled = false;
  }
}
function renderReveal(){
  const card = state.pack[state.revealIndex];
  if(!card) return;
  $("revealProgress").textContent = `${state.revealIndex + 1} / ${state.pack.length}`;
  $("revealCard").innerHTML = `<img src="${card.image}" alt="${escapeHtml(card.name)}">`;
  $("revealName").textContent = card.name;
  $("nextRevealBtn").textContent = state.revealIndex >= state.pack.length - 1 ? "Build Piles" : "Next Card";
}
function nextReveal(){
  if(state.revealIndex < state.pack.length - 1){
    state.revealIndex++;
    renderReveal();
  }else{
    renderBuild();
    showScreen("screen-build");
  }
}
function cardById(id){
  return state.pack.find(c => c.id === id) || state.boardCards.find(c => c.id === id) || state.looseCounters.find(c => c.id === id);
}
function renderBuild(){
  const pilesWrap = $("piles");
  pilesWrap.innerHTML = "";
  state.piles.forEach((pile, idx) => {
    const pileEl = document.createElement("div");
    const topCardId = pile[pile.length - 1];
    const topCard = topCardId ? state.pack.find(c => c.id === topCardId) : null;
    pileEl.className = "pile";
    pileEl.innerHTML = `
      <div class="pile-head">
        <div class="pile-name">Pile ${idx + 1}</div>
        <div class="pill-count">${pile.length}/3</div>
      </div>
      <div class="pile-drop" data-drop="pile" data-pile="${idx}"></div>
    `;
    const drop = pileEl.querySelector(".pile-drop");
    wireDropZone(drop);
    if(topCard){
      drop.innerHTML = `
        <div class="pile-preview">
          <img src="${topCard.image}" alt="${escapeHtml(topCard.name)}">
          <div class="pile-top-tag">Top card</div>
        </div>
      `;
    }else{
      drop.innerHTML = `<div class="pile-empty">Drop here</div>`;
    }
    pilesWrap.appendChild(pileEl);
  });

  const unsorted = state.pack.filter(c => state.cardZone[c.id] === "tray");
  $("unsortedCount").textContent = state.selectedBuildCard ? `Selected` : `${unsorted.length} left`;
  const tray = $("trayGrid");
  tray.innerHTML = "";
  tray.classList.toggle("active-target", state.selectedBuildCard && state.cardZone[state.selectedBuildCard] !== "tray");
  wireDropZone(tray, "tray");
  unsorted.forEach(card => tray.appendChild(makeMiniCard(card.id)));
  document.querySelectorAll('.pile-drop').forEach(drop => {
    const idx = Number(drop.dataset.pile);
    drop.classList.toggle('active-target', !!state.selectedBuildCard && state.cardZone[state.selectedBuildCard] !== idx && state.piles[idx].length < 3);
  });
}
function makeMiniCard(cardId){
  const card = state.pack.find(c => c.id === cardId);
  const el = document.createElement("div");
  el.className = `mini-card ${state.selectedBuildCard === cardId ? 'selected' : ''}`;
  el.draggable = true;
  el.dataset.cardId = cardId;
  el.innerHTML = `<img src="${card.image}" alt="${escapeHtml(card.name)}">`;
  el.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    toggleBuildCardSelection(cardId);
  });
  el.addEventListener("dragstart", e => {
    e.dataTransfer.setData("text/plain", cardId);
    setTimeout(() => el.classList.add("ghost"), 0);
  });
  el.addEventListener("dragend", () => el.classList.remove("ghost"));
  return el;
}
function toggleBuildCardSelection(cardId){
  state.selectedBuildCard = state.selectedBuildCard === cardId ? null : cardId;
  renderBuild();
}
function moveBuildCard(cardId, target){
  if(!cardId) return;
  const currentZone = state.cardZone[cardId];
  if(Number.isInteger(currentZone)){
    state.piles[currentZone] = state.piles[currentZone].filter(id => id !== cardId);
  }
  if(target === "tray"){
    state.cardZone[cardId] = "tray";
  }else{
    const pileIndex = Number(target);
    if(Number.isNaN(pileIndex)) return;
    if(state.piles[pileIndex].length >= 3 && !state.piles[pileIndex].includes(cardId)) return;
    if(!state.piles[pileIndex].includes(cardId)) state.piles[pileIndex].push(cardId);
    state.cardZone[cardId] = pileIndex;
  }
  state.selectedBuildCard = null;
  renderBuild();
}
function wireDropZone(el, type="pile") {
  if (el.dataset.bound === "1") return;
  el.dataset.bound = "1";
  el.addEventListener("click", e => {
    if(e.target.closest('.mini-card')) return;
    if(type === "tray"){
      if(state.selectedBuildCard) moveBuildCard(state.selectedBuildCard, "tray");
      return;
    }
    const pileIndex = Number(el.dataset.pile);
    if(state.selectedBuildCard){
      moveBuildCard(state.selectedBuildCard, pileIndex);
      return;
    }
    const pile = state.piles[pileIndex];
    if(pile && pile.length){
      const topCardId = pile[pile.length - 1];
      moveBuildCard(topCardId, "tray");
    }
  });
  el.addEventListener("dragover", e => e.preventDefault());
  el.addEventListener("drop", e => {
    e.preventDefault();
    const cardId = e.dataTransfer.getData("text/plain");
    if(!cardId) return;
    if(type === "tray"){
      moveBuildCard(cardId, "tray");
    }else{
      moveBuildCard(cardId, Number(el.dataset.pile));
    }
  });
}
function lockPiles(){
  const allGood = state.piles.every(p => p.length === 3) && state.pack.every(c => state.cardZone[c.id] !== "tray");
  if(!allGood){
    alert("Every pile needs exactly 3 cards.");
    return;
  }
  renderPick();
  showScreen("screen-pick");
}
function renderPick(){
  const grid = $("pickGrid");
  grid.innerHTML = "";
  state.piles.forEach((pile, idx) => {
    const used = state.usedPiles.includes(idx);
    const btn = document.createElement("button");
    btn.className = `face-pile ${used ? "used" : ""}`;
    btn.disabled = used;
    btn.innerHTML = `Pile ${idx + 1}<span>${used ? "used" : "tap to play"}</span>`;
    btn.addEventListener("click", () => beginPile(idx));
    grid.appendChild(btn);
  });
}
function beginPile(index){
  state.activePileIndex = index;
  if(!state.usedPiles.includes(index)) state.usedPiles.push(index);
  state.selectedEntity = null;
  state.looseCounters = [];
  state.boardCards = state.piles[index].map((cardId, i) => {
    const source = cardById(cardId);
    return {
      id: `board-${cardId}`,
      cardId,
      name: source.name,
      image: source.image,
      faces: source.faces || [{ name: source.name, image: source.image, type: source.type || "", oracle: source.oracle || "" }],
      faceIndex: 0,
      canFlip: !!source.canFlip,
      isToken: false,
      tokenLabel: "",
      tokenType: "",
      tokenPT: "",
      count: 0,
      x: 40 + i * 120,
      y: 0,
      placed: false,
      tapped: false,
      type: "card"
    };
  });
  renderPick();
  renderBoard();
  showScreen("screen-play");
}
function renderTrackers(){
  $("lifeValue").textContent = state.life;
  $("matchValue").textContent = state.match;
}
function renderBoard(){
  renderTrackers();
  const field = $("battlefield");
  field.innerHTML = `<div class="zone-label">Battlefield</div>`;
  state.boardCards.forEach((card, i) => {
    const isSelected = state.selectedEntity?.kind === "card" && state.selectedEntity.id === card.id;
    const face = card.faces?.[card.faceIndex || 0] || {};
    const el = document.createElement("div");
    el.className = `board-card ${card.tapped ? 'tapped' : ''} ${isSelected ? 'selected-card' : ''}`.trim();
    el.dataset.entityId = card.id;
    el.style.left = `${card.x}px`;
    el.style.top = `${card.y}px`;
    el.style.zIndex = ++state.z;
    el.innerHTML = card.isToken ? `
      <div class="token-face">
        <div class="token-type">${escapeHtml(card.tokenType || "Token Creature")}</div>
        <div class="token-title">${escapeHtml(card.tokenLabel || "Token")}</div>
        <div class="token-pt">${escapeHtml(card.tokenPT || "")}</div>
      </div>
      <div class="card-badge ${card.count ? 'show' : ''}">${card.count}</div>
    ` : `
      <img src="${face.image || card.image}" alt="${escapeHtml(face.name || card.name)}">
      <div class="flip-pill ${card.canFlip ? 'show' : ''}">↻</div>
      <div class="card-badge ${card.count ? 'show' : ''}">${card.count}</div>
    `;
    makeDraggable(el, card, "card");
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      card.tapped = !card.tapped;
      selectEntity({kind:"card", id:card.id});
      renderBoard();
    });
    field.appendChild(el);
  });

  state.looseCounters.forEach(counter => {
    const isSelected = state.selectedEntity?.kind === "counter" && state.selectedEntity.id === counter.id;
    const el = document.createElement("div");
    el.className = `counter-chip ${isSelected ? 'selected-counter' : ''}`.trim();
    el.dataset.entityId = counter.id;
    el.style.left = `${counter.x}px`;
    el.style.top = `${counter.y}px`;
    el.style.zIndex = ++state.z;
    el.innerHTML = `${counter.count}<small>${escapeHtml(counter.label)}</small>`;
    makeDraggable(el, counter, "counter");
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      selectEntity({kind:"counter", id:counter.id});
      renderBoard();
    });
    field.appendChild(el);
  });

  field.addEventListener("click", clearSelection, { once:true });
  renderSelectionBar();
  setTimeout(positionBoardCardsIfNeeded, 20);
}
function positionBoardCardsIfNeeded(){
  const field = $("battlefield");
  const rect = field.getBoundingClientRect();
  if(!rect.width || !state.boardCards.length) return;
  let changed = false;
  state.boardCards.forEach((card, i) => {
    if(card.placed) return;
    const width = Math.min(rect.width * 0.28, 160);
    const gap = Math.min(18, rect.width * 0.02);
    const total = width * state.boardCards.length + gap * (state.boardCards.length - 1);
    const startX = Math.max(10, (rect.width - total) / 2);
    card.x = startX + i * (width + gap);
    card.y = Math.max(12, rect.height - Math.min(rect.height * 0.33, 220));
    card.placed = true;
    changed = true;
  });
  if(changed) renderBoard();
}
function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }
function makeDraggable(el, obj, type){
  let dragging = false, startX = 0, startY = 0, objX = 0, objY = 0, moved = false;
  const field = $("battlefield");
  const start = (x,y) => {
    dragging = true;
    moved = false;
    startX = x; startY = y;
    objX = obj.x; objY = obj.y;
    el.style.zIndex = ++state.z;
  };
  const move = (x,y) => {
    if(!dragging) return;
    const rect = field.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();
    const dx = x - startX, dy = y - startY;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
    obj.x = clamp(objX + dx, 0, rect.width - elRect.width);
    obj.y = clamp(objY + dy, 0, rect.height - elRect.height);
    el.style.left = `${obj.x}px`;
    el.style.top = `${obj.y}px`;
  };
  const end = () => {
    if(!dragging) return;
    dragging = false;
    if(moved){
      setTimeout(() => {
        el.addEventListener("click", swallowClick, {once:true});
      }, 0);
    }
  };
  const swallowClick = e => e.stopPropagation();

  el.addEventListener("pointerdown", e => {
    e.preventDefault();
    start(e.clientX, e.clientY);
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener("pointermove", e => move(e.clientX, e.clientY));
  el.addEventListener("pointerup", end);
  el.addEventListener("pointercancel", end);
}
function selectEntity(ref){
  state.selectedEntity = ref;
  renderSelectionBar();
}
function clearSelection(){
  state.selectedEntity = null;
  renderSelectionBar();
  if(state.currentScreen === "screen-play") renderBoard();
}
function renderSelectionBar(){
  const bar = $("selectionBar");
  if(!state.selectedEntity){
    $("selectedFlip").style.display = "none";
    bar.classList.remove("active");
    return;
  }
  let entity = null;
  if(state.selectedEntity.kind === "card"){
    entity = state.boardCards.find(c => c.id === state.selectedEntity.id);
    if(!entity){ bar.classList.remove("active"); return; }
    const face = entity.faces?.[entity.faceIndex || 0];
    $("selectionName").textContent = entity.isToken ? (entity.tokenLabel || "Token") : (face?.name || entity.name);
    $("selectedDelete").style.display = entity.isToken ? "" : "none";
    $("selectedFlip").style.display = (!entity.isToken && entity.canFlip) ? "" : "none";
  }else{
    entity = state.looseCounters.find(c => c.id === state.selectedEntity.id);
    if(!entity){ bar.classList.remove("active"); return; }
    $("selectionName").textContent = entity.label;
    $("selectedDelete").style.display = "";
    $("selectedFlip").style.display = "none";
  }
  bar.classList.add("active");
}
function adjustSelected(delta){
  if(!state.selectedEntity) return;
  if(state.selectedEntity.kind === "card"){
    const card = state.boardCards.find(c => c.id === state.selectedEntity.id);
    if(!card) return;
    card.count = Math.max(0, card.count + delta);
  }else{
    const counter = state.looseCounters.find(c => c.id === state.selectedEntity.id);
    if(!counter) return;
    counter.count = Math.max(0, counter.count + delta);
  }
  renderBoard();
}
function deleteSelected(){
  if(!state.selectedEntity) return;
  if(state.selectedEntity.kind === "counter"){
    state.looseCounters = state.looseCounters.filter(c => c.id !== state.selectedEntity.id);
  }else{
    const card = state.boardCards.find(c => c.id === state.selectedEntity.id);
    if(!card || !card.isToken) return;
    state.boardCards = state.boardCards.filter(c => c.id !== state.selectedEntity.id);
  }
  state.selectedEntity = null;
  renderBoard();
}
function addCounter(label="Counter"){
  const field = $("battlefield").getBoundingClientRect();
  const id = `counter-${Math.random().toString(36).slice(2,9)}`;
  state.looseCounters.push({
    id,
    label,
    count: label === "+1/+1" ? 1 : 0,
    x: Math.max(12, field.width/2 - 32 + Math.random()*40 - 20),
    y: Math.max(20, field.height/2 - 32 + Math.random()*40 - 20),
    type: "counter"
  });
  renderBoard();
}
function createToken(){
  const label = prompt("Token name", "Creature Token") || "Creature Token";
  const pt = prompt("Power / Toughness", "1/1") || "1/1";
  const subType = prompt("Token type", "Token Creature") || "Token Creature";
  const field = $("battlefield").getBoundingClientRect();
  const id = `token-${Math.random().toString(36).slice(2,9)}`;
  state.boardCards.push({
    id,
    cardId: id,
    name: label,
    image: "",
    faces: [],
    faceIndex: 0,
    canFlip: false,
    isToken: true,
    tokenLabel: label,
    tokenType: subType,
    tokenPT: pt,
    count: 0,
    x: Math.max(12, field.width * 0.5 - 60 + Math.random()*60 - 30),
    y: Math.max(18, field.height * 0.34 + Math.random()*50 - 25),
    placed: true,
    tapped: false,
    type: "card"
  });
  state.tokenCounter += 1;
  renderBoard();
}
function flipSelected(){
  if(!state.selectedEntity || state.selectedEntity.kind !== "card") return;
  const card = state.boardCards.find(c => c.id === state.selectedEntity.id);
  if(!card || card.isToken || !card.canFlip || !card.faces?.length) return;
  card.faceIndex = (card.faceIndex + 1) % card.faces.length;
  renderBoard();
}
function resetBoard(){
  state.selectedEntity = null;
  state.looseCounters = [];
  state.boardCards = state.boardCards.filter(c => !c.isToken);
  state.boardCards.forEach(c => {
    c.count = 0;
    c.placed = false;
    c.tapped = false;
    c.faceIndex = 0;
  });
  renderBoard();
}
function changeLife(delta){
  state.life += delta;
  renderTrackers();
}
function changeMatch(delta){
  state.match = Math.max(0, state.match + delta);
  renderTrackers();
}
function bindEvents(){
  $("refreshSetsBtn").addEventListener("click", loadSets);
  $("setSelect").addEventListener("change", e => {
    const set = state.sets.find(s => s.code === e.target.value);
    state.selectedSetCode = set?.code || "";
    state.selectedSetName = set?.name || "";
  });
  $("openPackBtn").addEventListener("click", openPack);
  $("nextRevealBtn").addEventListener("click", nextReveal);
  $("skipRevealBtn").addEventListener("click", () => {
    renderBuild();
    showScreen("screen-build");
  });
  $("lockPilesBtn").addEventListener("click", lockPiles);
  $("backToBuildBtn").addEventListener("click", () => showScreen("screen-build"));
  $("backToPickBtn").addEventListener("click", () => {
    clearSelection();
    showScreen("screen-pick");
  });
  $("lifeMinus").addEventListener("click", () => changeLife(-1));
  $("lifePlus").addEventListener("click", () => changeLife(1));
  $("matchMinus").addEventListener("click", () => changeMatch(-1));
  $("matchPlus").addEventListener("click", () => changeMatch(1));
  $("toggleTrayBtn").addEventListener("click", () => {
    state.trayOpen = !state.trayOpen;
    $("counterTray").classList.toggle("active", state.trayOpen);
  });
  $("selectedMinus").addEventListener("click", () => adjustSelected(-1));
  $("selectedPlus").addEventListener("click", () => adjustSelected(1));
  $("selectedFlip").addEventListener("click", flipSelected);
  $("selectedDelete").addEventListener("click", deleteSelected);
  $("addCounterBtn").addEventListener("click", () => addCounter("Counter"));
  $("addPlusOneBtn").addEventListener("click", () => addCounter("+1/+1"));
  $("addTokenBtn").addEventListener("click", createToken);
  $("resetBoardBtn").addEventListener("click", resetBoard);
  window.addEventListener("resize", () => {
    if(state.currentScreen === "screen-play") setTimeout(positionBoardCardsIfNeeded, 40);
  });
}
initSteps();
bindEvents();
loadSets();
</script>
</body>
</html>
