<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Spin Wheel</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(circle at top, #313866, #151728 55%, #090a12);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
  }

  h1 {
    margin: 8px 0 4px;
    font-size: 2rem;
    letter-spacing: 1px;
  }

  .subtitle {
    opacity: 0.75;
    font-size: 0.95rem;
    margin-bottom: 14px;
  }

  .wheel-wrap {
    position: relative;
    width: min(92vw, 430px);
    height: min(92vw, 430px);
    margin: 8px auto 20px;
  }

  canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    filter: drop-shadow(0 18px 30px rgba(0,0,0,0.5));
  }

  .pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-top: 42px solid #fff;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4));
    z-index: 5;
  }

  .center-button {
    position: absolute;
    inset: 50%;
    transform: translate(-50%, -50%);
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 5px solid white;
    background: radial-gradient(circle, #ffffff, #cfcfcf);
    color: #111;
    font-size: 1.15rem;
    font-weight: 900;
    box-shadow:
      inset 0 -6px 10px rgba(0,0,0,0.25),
      0 8px 18px rgba(0,0,0,0.45);
    cursor: pointer;
  }

  .center-button:active {
    transform: translate(-50%, -50%) scale(0.95);
  }

  .result {
    min-height: 46px;
    font-size: 1.35rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 12px;
    text-shadow: 0 3px 8px black;
  }

  .panel {
    width: min(92vw, 520px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
  }

  .row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  input {
    flex: 1;
    border: none;
    outline: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 1rem;
    background: rgba(255,255,255,0.95);
    color: #111;
  }

  button {
    border: none;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
  }

  .add {
    background: #60ffa6;
    color: #07120b;
  }

  .small-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .ghost {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.18);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 190px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 8px;
  }

  .option span {
    flex: 1;
    overflow-wrap: anywhere;
  }

  .delete {
    background: #ff5f7a;
    color: white;
    padding: 8px 11px;
  }

  .hint {
    opacity: 0.65;
    font-size: 0.8rem;
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>Spin Wheel</h1>
<div class="subtitle">Add options. Smash spin. Let fate be stupid.</div>

<div class="wheel-wrap">
  <div class="pointer"></div>
  <canvas id="wheel" width="900" height="900"></canvas>
  <button class="center-button" onclick="spin()">SPIN</button>
</div>

<div class="result" id="result">Add choices or spin the defaults</div>

<div class="panel">
  <div class="row">
    <input id="optionInput" placeholder="Add an option..." />
    <button class="add" onclick="addOption()">Add</button>
  </div>

  <div class="small-buttons">
    <button class="ghost" onclick="shuffleOptions()">Shuffle</button>
    <button class="ghost" onclick="resetOptions()">Reset</button>
  </div>

  <div class="options" id="optionsList"></div>

  <div class="hint">Your options save automatically on this device.</div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");
const input = document.getElementById("optionInput");
const optionsList = document.getElementById("optionsList");

let options = JSON.parse(localStorage.getItem("spinOptions")) || [
  "Blowjob",
  "Riding",
  "Doggy",
  "Roadhead",
  "Creampie",
  "PussyEating"
];

let rotation = 0;
let spinning = false;

const colors = [
  "#ff595e", "#ffca3a", "#8ac926", "#1982c4",
  "#6a4c93", "#ff924c", "#52b788", "#f72585",
  "#4cc9f0", "#b5179e", "#f9844a", "#90be6d"
];

function save() {
  localStorage.setItem("spinOptions", JSON.stringify(options));
}

function drawWheel() {
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const radius = w * 0.46;

  ctx.clearRect(0, 0, w, h);

  if (options.length === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = "#333";
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.font = "bold 48px system-ui";
    ctx.textAlign = "center";
    ctx.fillText("Add Options", cx, cy);
    return;
  }

  const slice = (Math.PI * 2) / options.length;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  for (let i = 0; i < options.length; i++) {
    const start = i * slice;
    const end = start + slice;

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.save();
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = options.length > 10 ? "bold 28px system-ui" : "bold 38px system-ui";
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur = 6;

    let text = options[i];
    if (text.length > 18) text = text.slice(0, 18) + "...";

    ctx.fillText(text, radius - 35, 12);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.lineWidth = 12;
  ctx.strokeStyle = "white";
  ctx.stroke();

  ctx.restore();
}

function renderOptions() {
  optionsList.innerHTML = "";

  options.forEach((option, index) => {
    const div = document.createElement("div");
    div.className = "option";

    const span = document.createElement("span");
    span.textContent = option;

    const del = document.createElement("button");
    del.className = "delete";
    del.textContent = "X";
    del.onclick = () => {
      options.splice(index, 1);
      save();
      renderOptions();
      drawWheel();
    };

    div.appendChild(span);
    div.appendChild(del);
    optionsList.appendChild(div);
  });
}

function addOption() {
  const value = input.value.trim();

  if (!value) return;

  options.push(value);
  input.value = "";
  save();
  renderOptions();
  drawWheel();
}

function resetOptions() {
  options = ["Blowjob", "Riding", "Doggy", "Roadhead", "Creampie", "PussyEating"];
  result.textContent = "Reset to defaults";
  save();
  renderOptions();
  drawWheel();
}

function shuffleOptions() {
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  save();
  renderOptions();
  drawWheel();
}

function spin() {
  if (spinning || options.length === 0) return;

  spinning = true;
  result.textContent = "Spinning...";

  const slice = (Math.PI * 2) / options.length;
  const spins = 7 + Math.random() * 5;
  const randomStop = Math.random() * Math.PI * 2;
  const startRotation = rotation;
  const endRotation = rotation + spins * Math.PI * 2 + randomStop;
  const duration = 4200;
  const start = performance.now();

  tickSound();

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t, 4);

    rotation = startRotation + (endRotation - startRotation) * eased;
    drawWheel();

    if (Math.random() < 0.18 && t < 0.9) tickSound();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = endRotation % (Math.PI * 2);

      const pointerAngle = (Math.PI * 1.5 - rotation + Math.PI * 2) % (Math.PI * 2);
      const winnerIndex = Math.floor(pointerAngle / slice) % options.length;
      const winner = options[winnerIndex];

      result.textContent = "Winner: " + winner;
      boomSound();

      if (navigator.vibrate) navigator.vibrate([80, 40, 120]);

      spinning = false;
      drawWheel();
    }
  }

  requestAnimationFrame(animate);
}

function tickSound() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;

  const audio = new AudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.frequency.value = 650;
  gain.gain.value = 0.035;

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  osc.stop(audio.currentTime + 0.025);
}

function boomSound() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;

  const audio = new AudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();

  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(180, audio.currentTime);
  osc.frequency.exponentialRampToValueAtTime(45, audio.currentTime + 0.35);

  gain.gain.setValueAtTime(0.08, audio.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.35);

  osc.connect(gain);
  gain.connect(audio.destination);

  osc.start();
  osc.stop(audio.currentTime + 0.35);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") addOption();
});

renderOptions();
drawWheel();
</script>

</body>
</html>
