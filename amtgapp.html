<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith | Ultimate MTG Forge</title>
    <style>
        :root {
            --bg-deep: #050505;
            --bg-glass: rgba(16, 16, 20, 0.85);
            --bg-panel: #18181b;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --special: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --success: #2ecc71;
            /* Mana Colors */
            --w: #fef08a; --u: #3b82f6; --b: #4b5563; --r: #ef4444; --g: #22c55e; --c: #9ca3af;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; background-color: var(--bg-deep); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- HEADER & GLOBAL NAV --- */
        header {
            flex-shrink: 0; background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 50; padding-top: var(--safe-top);
        }
        .nav-top { height: 60px; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
        .brand { font-weight: 900; font-size: 1.2rem; background: linear-gradient(to right, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-box { flex: 1; position: relative; display: flex; align-items: center;}
        .search-input, select.global-select {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 10px; color: white; font-size: 0.95rem; transition: 0.3s;
        }
        .search-input { padding-left: 38px; }
        .search-input:focus { background: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .search-icon { position: absolute; left: 12px; color: var(--text-muted); }

        .btn-icon {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--border);
            color: white; cursor: pointer; position: relative; transition: 0.2s;
        }
        .btn-icon:active { transform: scale(0.95); background: var(--primary); }
        .badge { position: absolute; top: -4px; right: -4px; background: var(--special); width: 16px; height: 16px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-deep); color: black; font-weight: bold; }

        /* --- BOTTOM NAV --- */
        #nav-bar {
            height: 70px; background: var(--bg-panel); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 100; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; width: 33%; font-weight: 600; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 4px; }

        /* --- MAIN CONTAINER --- */
        #app-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .view { position: absolute; inset: 0; display: none; flex-direction: column; overflow-y: auto; padding: 15px 10px 100px 10px; -webkit-overflow-scrolling: touch; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GRID (Search & Binder) --- */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; width: 100%; }
        @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }
        .card-wrapper { animation: fadeUp 0.5s ease forwards; opacity: 0; transform: translateY(20px); position: relative; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .card-item { position: relative; aspect-ratio: 2.5/3.5; border-radius: 12px; background: var(--bg-panel); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid transparent; }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s; }
        .card-img.loaded { opacity: 1; }
        
        .fav-indicator { position: absolute; top: 0; right: 0; padding: 10px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-size: 1.4rem; z-index: 5; opacity: 0.5; transition: 0.2s; }
        .card-wrapper.in-deck .fav-indicator { opacity: 1; color: #ef4444; }
        .col-count-badge { position: absolute; bottom: 8px; left: 8px; background: var(--primary); color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none;}

        /* --- PACK OPENING STAGE --- */
        #pack-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 1000px; padding-top: 20px;}
        .pack-wrapper { width: 280px; height: 420px; position: relative; animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .pack-body { width: 100%; height: 100%; background: linear-gradient(135deg, #222, #000); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid #444; position: relative; overflow: hidden; }
        .pack-body::before { content: ""; position: absolute; inset: 0; background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.1) 55%, transparent 70%); background-size: 200% 100%; animation: shimmer 5s infinite linear; pointer-events: none; z-index: 5; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .pack-icon { width: 60%; height: 60%; opacity: 0.9; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); object-fit: contain; z-index: 2; }
        .pack-strip { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #252525 10px, #252525 20px); z-index: 20; border-radius: 20px 20px 0 0; border-bottom: 2px dashed #555; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer;}
        .tear-progress { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: linear-gradient(90deg, var(--primary), #fff); pointer-events: none; opacity: 0.8; }
        
        .card-stack { width: 280px; height: 390px; position: relative; display: none; }
        .pack-card { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border-radius: 14px; background-size: cover; background-position: center; box-shadow: 0 10px 40px rgba(0,0,0,0.9); background-color: #222; transition: transform 0.3s, opacity 0.3s; border: 1px solid #111; cursor: pointer; }
        .pack-card.swiped { transform: translateX(140%) rotate(25deg); opacity: 0; pointer-events: none;}
        .pack-card.foil::after { content: ""; position: absolute; inset: 0; border-radius: 14px; background: linear-gradient(125deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 70%); mix-blend-mode: overlay; opacity: 0.6; animation: foilShine 4s infinite; pointer-events: none;}
        @keyframes foilShine { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .price-pop { position: fixed; font-size: 2.5rem; font-weight: 900; color: var(--success); text-shadow: 0 2px 10px rgba(0,0,0,0.8); pointer-events: none; z-index: 2000; animation: popUp 1.2s ease-out forwards; }
        @keyframes popUp { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -200%) scale(1); opacity: 0; } }

        /* --- DECK LAYER --- */
        .full-layer { position: fixed; inset: 0; background: var(--bg-deep); z-index: 200; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .full-layer.active { transform: translateY(0); }
        .layer-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-glass); padding-top: max(15px, var(--safe-top)); }
        .layer-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .layer-close { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; cursor: pointer; }
        .layer-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        .commander-zone { background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%); border: 1px dashed var(--primary); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 30px; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .commander-zone.has-cmdr { display: flex; border-style: solid; background: radial-gradient(circle at center, rgba(245, 158, 11, 0.1) 0%, rgba(0,0,0,0) 80%); border-color: var(--special); }
        .type-header { font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .deck-list-item { display: flex; align-items: center; gap: 12px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 6px; }
        .deck-card-name { flex: 1; font-weight: 500; font-size: 0.95rem; }
        .btn-delete { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #666; background: rgba(255,255,255,0.05);}
        .btn-delete:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .btn-apply { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px;}
        
        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-card-wrapper { width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .card-3d-wrap { width: 100%; border-radius: 18px; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6); margin-bottom: 25px; }
        .modal-img { width: 100%; display: block; }
        .modal-actions { display: flex; gap: 10px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .action-btn { background: #27272a; border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .action-btn.primary-btn { background: var(--primary); border-color: var(--primary); }
        .action-btn.delete-btn { background: #ef4444; border-color: #ef4444; }
        .modal-close-btn { position: absolute; top: 20px; right: 20px; width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; z-index: 310;}

        /* --- UTILS --- */
        .stat-card { background: var(--bg-panel); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--success); }
        .subtitle { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; font-weight: 600; margin-bottom: 5px;}
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <div class="brand"><span>✦</span> Zenith</div>
            <div class="search-box" id="global-search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search all cards..." onkeypress="handleEnter(event)">
            </div>
            <div class="btn-icon" onclick="openDeckView()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                <div class="badge" id="deckCount">0</div>
            </div>
        </div>
    </header>

    <div id="app-container">
        
        <div id="view-search" class="view active" onscroll="checkScroll(this, 'search')">
            <div class="card-grid" id="search-grid"></div>
            <div id="search-loader" style="text-align:center; padding:20px; color:#666; display:none;">Searching...</div>
        </div>

        <div id="view-packs" class="view">
            <div class="stat-card">
                <div class="subtitle">Collection Value</div>
                <div class="stat-val" id="total-value">$0.00</div>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <select id="set-select" class="global-select" onchange="loadSetForPack()">
                    <option disabled selected>Loading expansions...</option>
                </select>
            </div>

            <div id="pack-stage">
                <div id="pack-wrapper" class="pack-wrapper" style="display:none;">
                    <div class="pack-strip" id="pack-strip">
                        <span style="font-size:0.7rem; color:#aaa; pointer-events:none; font-weight:bold;">SLIDE TO OPEN >>></span>
                        <div class="tear-progress" id="tear-line"></div>
                    </div>
                    <div class="pack-body">
                        <img id="pack-icon" class="pack-icon" src="" alt="">
                        <div style="position:absolute; bottom:30px; font-size:1.5rem; font-weight:900; color:var(--primary);" id="pack-title">MTG</div>
                    </div>
                </div>
                
                <div id="card-stack" class="card-stack"></div>

                <div id="summary-screen" style="display:none; flex-direction:column; align-items:center; width:100%;">
                    <h2 style="color:var(--primary); margin-bottom:5px;">PACK OPENED</h2>
                    <div class="stat-card" style="width:100%;">
                        <div class="subtitle">Pack Value</div>
                        <div class="stat-val" style="font-size:1.5rem;" id="pack-value">$0.00</div>
                    </div>
                    <button class="btn-apply" onclick="resetPack()">Open Another Pack</button>
                </div>
            </div>
        </div>

        <div id="view-binder" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                <h2 style="margin:0;">My Binder</h2>
                <select id="sort-select" class="global-select" style="width:auto; padding:8px;" onchange="renderBinder()">
                    <option value="value">Price: High</option>
                    <option value="recent">Recent</option>
                </select>
            </div>
            <input type="text" class="search-input" id="binderSearch" placeholder="Filter binder..." oninput="renderBinder()" style="margin-bottom: 15px;">
            <div class="card-grid" id="binder-grid"></div>
        </div>

    </div>

    <div id="nav-bar">
        <div class="nav-item active" onclick="switchView('search', this)">
            <div class="nav-icon">🔍</div><div>Database</div>
        </div>
        <div class="nav-item" onclick="switchView('packs', this)">
            <div class="nav-icon">📦</div><div>Packs</div>
        </div>
        <div class="nav-item" onclick="switchView('binder', this)">
            <div class="nav-icon">📚</div><div>Binder</div>
        </div>
    </div>

    <div class="full-layer" id="deckLayer">
        <div class="layer-header">
            <div class="layer-title"><span style="color:var(--special)">✦</span> Deck Forge</div>
            <div class="layer-close" onclick="closeDeckView()">×</div>
        </div>
        <div class="layer-content">
            <div class="commander-zone" id="commanderZone"></div>
            <div id="deckListContainer"></div>
            <button class="btn-apply" style="background:var(--bg-panel); border:1px solid var(--border); color:#ef4444; margin-top:30px;" onclick="destroyDeck()">Clear Deck</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-close-btn" onclick="closeModal()">×</div>
        <div class="modal-card-wrapper">
            <div class="card-3d-wrap">
                <img src="" id="modalImg" class="modal-img">
            </div>
            <div style="text-align:center; margin-bottom:15px; color:white;">
                <h3 id="modalTitle" style="margin:0 0 5px 0;"></h3>
                <div id="modalPrice" style="color:var(--success); font-weight:bold; font-size:1.2rem;"></div>
            </div>
            <div class="modal-actions" id="modalActionContainer"></div>
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        // --- MASTER STATE ---
        const state = {
            view: 'search', // search, packs, binder
            
            // Search API State
            searchQuery: '', searchData: [], searchPage: 1, searchHasMore: true, isSearching: false, searchNextUrl: null,
            
            // App Data
            sets: [],
            collection: JSON.parse(localStorage.getItem('zenith_collection')) || {},
            deck: JSON.parse(localStorage.getItem('zenith_deck')) || [],
            commanderId: localStorage.getItem('zenith_cmdr') || null,
            
            // Pack Sim State
            currentSet: null,
            packPool: { common: [], uncommon: [], rare: [], mythic: [], land: [] },
            isPackLoaded: false,
            tempPackValue: 0,
            
            // Modal Target
            activeCard: null
        };

        const els = {
            searchGrid: document.getElementById('search-grid'), binderGrid: document.getElementById('binder-grid'),
            searchInput: document.getElementById('searchInput'), searchContainer: document.getElementById('global-search-container'),
            toast: document.getElementById('toast'), deckCount: document.getElementById('deckCount'),
            modal: document.getElementById('modal'), deckLayer: document.getElementById('deckLayer')
        };

        // --- UTILS ---
        const showToast = (msg) => { els.toast.innerText = msg; els.toast.style.opacity = 1; setTimeout(() => els.toast.style.opacity = 0, 2000); };
        const fmtMoney = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
        const getPrice = (c) => parseFloat(c.prices?.usd || c.prices?.usd_foil || 0);

        window.addEventListener('DOMContentLoaded', async () => {
            updateDeckCount();
            fetchSearchCards(true); // Load initial database view (Secret Lairs or default)
            initSets(); // Prep pack simulator
            renderBinder(); // Calculate total value
            initPackTear();
        });

        // --- VIEW NAVIGATION ---
        function switchView(viewName, navItem) {
            state.view = viewName;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            navItem.classList.add('active');

            // Header search bar visibility
            els.searchContainer.style.visibility = viewName === 'search' ? 'visible' : 'hidden';
            
            if(viewName === 'binder') renderBinder();
        }

        // --- VIEW 1: GLOBAL DATABASE (API) ---
        function handleEnter(e) { if (e.key === 'Enter') { els.searchInput.blur(); fetchSearchCards(true); } }
        
        async function fetchSearchCards(reset = false) {
            if(state.isSearching) return;
            state.isSearching = true; document.getElementById('search-loader').style.display = 'block';
            
            if(reset) { state.searchData = []; state.searchPage = 1; els.searchGrid.innerHTML = ''; state.searchNextUrl = null; }
            
            const q = els.searchInput.value.trim() || 'set:sld'; // Default to Secret Lair if empty
            let url = state.searchNextUrl || `https://api.scryfall.com/cards/search?q=${encodeURIComponent(q)}&order=usd`;

            try {
                const res = await fetch(url); const json = await res.json();
                if(json.code === 'not_found') { els.searchGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">No cards found.</div>'; state.searchHasMore = false; }
                else {
                    state.searchData = [...state.searchData, ...json.data];
                    state.searchHasMore = json.has_more; state.searchNextUrl = json.next_page;
                    json.data.forEach((c) => renderCard(c, els.searchGrid, 'search'));
                }
            } catch(e) { console.error(e); } finally { state.isSearching = false; document.getElementById('search-loader').style.display = 'none'; }
        }

        function checkScroll(el, type) {
            if(type === 'search' && state.searchHasMore && !state.isSearching) {
                if(el.scrollTop + el.clientHeight >= el.scrollHeight - 300) fetchSearchCards();
            }
        }

        function renderCard(c, container, context) {
            let img = c.image_uris?.normal || c.card_faces?.[0]?.image_uris?.normal; if(!img) return;
            const inDeck = state.deck.some(d => d.id === c.id);
            const div = document.createElement('div');
            div.className = `card-wrapper ${inDeck ? 'in-deck' : ''}`; div.dataset.id = c.id;
            
            let extraHTML = '';
            if(context === 'binder' && state.collection[c.id]) {
                extraHTML = `<div class="col-count-badge">x${state.collection[c.id].count}</div>`;
            }

            div.innerHTML = `
                <div class="card-item" onclick="openModal('${c.id}', '${context}')">
                    <img src="${img}" class="card-img" onload="this.classList.add('loaded')">
                    ${extraHTML}
                    <div class="fav-indicator" onclick="event.stopPropagation(); toggleDeckCard('${c.id}', '${context}', true)">♥</div>
                </div>`;
            container.appendChild(div);
        }

        // --- VIEW 2: PACK SIMULATOR ---
        async function initSets() {
            try {
                const res = await fetch('https://api.scryfall.com/sets'); const data = await res.json();
                state.sets = data.data.filter(s => ['core', 'expansion', 'masters', 'commander'].includes(s.set_type) && s.card_count > 0);
                const sel = document.getElementById('set-select'); sel.innerHTML = '<option value="" disabled selected>Select Expansion...</option>';
                state.sets.forEach(s => sel.innerHTML += `<option value="${s.code}">${s.name}</option>`);
            } catch(e) { console.error(e); }
        }

        async function loadSetForPack() {
            const code = document.getElementById('set-select').value; const set = state.sets.find(s => s.code === code);
            if(!set) return;
            document.getElementById('pack-title').innerText = set.name;
            if(set.icon_svg_uri) document.getElementById('pack-icon').src = set.icon_svg_uri;
            resetPack(); document.getElementById('pack-wrapper').style.opacity = '0.5'; showToast(`Loading ${set.name}...`); state.isPackLoaded = false;
            
            try {
                let allCards = []; let url = `https://api.scryfall.com/cards/search?q=set:${code}%20unique:cards%20game:paper`;
                while(url) {
                    let r = await fetch(url); let d = await r.json();
                    if(d.data) allCards = allCards.concat(d.data); url = d.has_more ? d.next_page : null;
                }
                state.packPool = { common: [], uncommon: [], rare: [], mythic: [], land: [] };
                allCards.forEach(c => {
                    let img = c.image_uris?.normal || c.card_faces?.[0]?.image_uris?.normal;
                    if(img && c.rarity) {
                        const obj = { id: c.id, name: c.name, img: img, rarity: c.rarity, prices: c.prices, type_line: c.type_line, raw: c };
                        if(c.type_line?.includes("Basic Land")) state.packPool.land.push(obj); else if(state.packPool[c.rarity]) state.packPool[c.rarity].push(obj);
                    }
                });
                state.isPackLoaded = true; document.getElementById('pack-wrapper').style.opacity = '1'; showToast("Ready to open!");
                document.getElementById('pack-wrapper').style.display = 'flex';
            } catch(e) { showToast("Error loading set."); }
        }

        let isDragging = false;
        function initPackTear() {
            const strip = document.getElementById('pack-strip'); const tear = document.getElementById('tear-line');
            const handleMove = (e) => {
                if(!isDragging) return; const rect = strip.getBoundingClientRect();
                let pct = ((e.touches ? e.touches[0].clientX : e.clientX) - rect.left) / rect.width * 100;
                tear.style.width = Math.max(0, Math.min(pct, 100)) + '%'; if(pct > 90) { openPack(); isDragging = false; }
            };
            strip.addEventListener('mousedown', () => isDragging = true); window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', () => { isDragging = false; tear.style.width = '0%'; });
            strip.addEventListener('touchstart', () => isDragging = true); window.addEventListener('touchmove', handleMove); window.addEventListener('touchend', () => { isDragging = false; tear.style.width = '0%'; });
        }

        function resetPack() {
            document.getElementById('pack-wrapper').style.display = state.isPackLoaded ? 'flex' : 'none';
            document.getElementById('card-stack').style.display = 'none';
            document.getElementById('summary-screen').style.display = 'none';
            document.getElementById('tear-line').style.width = '0%';
        }

        function openPack() {
            if(!state.isPackLoaded) return;
            const p = state.packPool; const pick = arr => arr.length ? arr[Math.floor(Math.random()*arr.length)] : null;
            let pack = [];
            if(p.mythic.length && Math.random() < 0.13) pack.push({...pick(p.mythic)}); else if(p.rare.length) pack.push({...pick(p.rare)});
            for(let i=0; i<3; i++) { let c=pick(p.uncommon); if(c) pack.push({...c}); }
            for(let i=0; i<10; i++) { let c=pick(p.common); if(c) pack.push({...c}); }
            if(p.land.length) pack.push({...pick(p.land)});
            
            // Random foil chance
            if(Math.random() < 0.3 && pack.length > 0) pack[pack.length-2].foil = true; 

            document.getElementById('pack-wrapper').style.display = 'none';
            const stack = document.getElementById('card-stack'); stack.style.display = 'block'; stack.innerHTML = '';
            state.tempPackValue = 0;

            pack.forEach((card, idx) => {
                const el = document.createElement('div'); el.className = `pack-card ${card.foil ? 'foil' : ''}`; el.style.backgroundImage = `url(${card.img})`; el.style.zIndex = pack.length - idx;
                el.onclick = (e) => {
                    saveToBinder(card.raw); el.classList.add('swiped');
                    let val = getPrice(card); state.tempPackValue += val;
                    if(val > 2) showPriceExplosion(e.clientX, e.clientY, val);
                    if(idx === pack.length - 1) setTimeout(showSummary, 500);
                };
                stack.appendChild(el);
            });
        }

        function showPriceExplosion(x, y, val) {
            const el = document.createElement('div'); el.className = 'price-pop'; el.innerText = fmtMoney(val);
            el.style.left = x + 'px'; el.style.top = y + 'px'; document.body.appendChild(el);
            setTimeout(() => document.body.removeChild(el), 1200);
        }

        function showSummary() {
            document.getElementById('card-stack').style.display = 'none';
            document.getElementById('summary-screen').style.display = 'flex';
            document.getElementById('pack-value').innerText = fmtMoney(state.tempPackValue);
        }

        // --- VIEW 3: BINDER & COLLECTION MANAGEMENT ---
        function saveToBinder(rawCard) {
            if(!state.collection[rawCard.id]) state.collection[rawCard.id] = { ...rawCard, count: 0, dateAdded: Date.now() };
            state.collection[rawCard.id].count++;
            localStorage.setItem('zenith_collection', JSON.stringify(state.collection));
            updateTotalValue();
        }

        function updateTotalValue() {
            let total = Object.values(state.collection).reduce((acc, c) => acc + (getPrice(c) * c.count), 0);
            document.getElementById('total-value').innerText = fmtMoney(total);
        }

        function renderBinder() {
            updateTotalValue();
            els.binderGrid.innerHTML = '';
            let cards = Object.values(state.collection);
            const term = document.getElementById('binderSearch').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;

            if(term) cards = cards.filter(c => c.name.toLowerCase().includes(term) || c.type_line?.toLowerCase().includes(term));
            
            cards.sort((a,b) => sort === 'value' ? getPrice(b) - getPrice(a) : b.dateAdded - a.dateAdded);

            if(cards.length === 0) { els.binderGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">Binder empty. Open packs!</div>'; return; }
            cards.forEach(c => renderCard(c, els.binderGrid, 'binder'));
        }

        // --- DECK MANAGEMENT ---
        function toggleDeckCard(id, context, onlyAdd = false) {
            let cardObj = state.searchData.find(c => c.id === id) || state.collection[id];
            if(!cardObj && context === 'binder') cardObj = state.collection[id];

            const idx = state.deck.findIndex(c => c.id === id);
            let wasRemoved = false;
            
            if(idx > -1) {
                if(!onlyAdd) { state.deck.splice(idx, 1); if(state.commanderId === id) state.commanderId = null; wasRemoved = true; }
            } else {
                if(cardObj) state.deck.push(cardObj);
            }
            
            localStorage.setItem('zenith_deck', JSON.stringify(state.deck)); localStorage.setItem('zenith_cmdr', state.commanderId || '');
            updateDeckCount();
            
            // UI Updates
            document.querySelectorAll(`.card-wrapper[data-id="${id}"]`).forEach(el => el.classList.toggle('in-deck', !wasRemoved));
            if(els.modal.classList.contains('active')) openModal(id, context); // refresh buttons
            if(els.deckLayer.classList.contains('active')) renderDeck();
        }

        function setCommander(id, context) {
            state.commanderId = state.commanderId === id ? null : id;
            localStorage.setItem('zenith_cmdr', state.commanderId || '');
            if(els.modal.classList.contains('active')) openModal(id, context);
            renderDeck();
        }

        function destroyDeck() {
            if(confirm('Obliterate current deck?')) { state.deck = []; state.commanderId = null; toggleDeckCard('none'); } // forces save
        }

        function updateDeckCount() { els.deckCount.textContent = state.deck.length; }

        function openDeckView() { els.deckLayer.classList.add('active'); renderDeck(); }
        function closeDeckView() { els.deckLayer.classList.remove('active'); }

        function renderDeck() {
            const container = document.getElementById('deckListContainer'); const cmdrZone = document.getElementById('commanderZone');
            const commander = state.deck.find(c => c.id === state.commanderId);
            
            if(commander) {
                let img = commander.image_uris?.normal || commander.card_faces?.[0]?.image_uris?.normal;
                cmdrZone.className = 'commander-zone has-cmdr';
                cmdrZone.innerHTML = `<img src="${img}" style="height:200px; border-radius:12px; box-shadow:0 10px 40px rgba(245, 158, 11, 0.3);">
                                      <div style="margin-top:10px; font-weight:bold; color:var(--special);">👑 ${commander.name}</div>`;
            } else { cmdrZone.className = 'commander-zone'; cmdrZone.innerHTML = ''; }

            container.innerHTML = ''; const rest = state.deck.filter(c => c.id !== state.commanderId);
            if(rest.length === 0 && !commander) { container.innerHTML = '<div style="text-align:center; color:#555; margin-top:50px;">Deck is empty.</div>'; return; }

            const types = ['Creature', 'Planeswalker', 'Instant', 'Sorcery', 'Artifact', 'Enchantment', 'Land'];
            types.forEach(type => {
                const group = rest.filter(c => c.type_line?.includes(type) && (type !== 'Artifact' || !c.type_line.includes('Creature'))); // rough sorting
                if(group.length > 0) {
                    const sec = document.createElement('div');
                    sec.innerHTML = `<div class="type-header"><span>${type}s</span><span>${group.length}</span></div>`;
                    group.forEach(c => {
                        sec.innerHTML += `<div class="deck-list-item">
                            <div class="deck-card-name">${c.name}</div>
                            <div class="btn-delete" onclick="toggleDeckCard('${c.id}', 'deck')">✕</div>
                        </div>`;
                    });
                    container.appendChild(sec);
                }
            });
        }

        // --- UNIFIED MODAL ---
        function openModal(id, context) {
            const c = state.searchData.find(x => x.id === id) || state.collection[id]; if(!c) return;
            state.activeCard = c;
            
            let img = c.image_uris?.png || c.card_faces?.[0]?.image_uris?.png || c.image_uris?.normal;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalTitle').textContent = c.name;
            document.getElementById('modalPrice').textContent = fmtMoney(getPrice(c));
            
            const inDeck = state.deck.some(d => d.id === c.id);
            const isCmdr = state.commanderId === c.id;
            let html = '';
            
            if(inDeck) html += `<button class="action-btn delete-btn" onclick="toggleDeckCard('${c.id}', '${context}')">✕ Remove from Deck</button>`;
            else html += `<button class="action-btn primary-btn" onclick="toggleDeckCard('${c.id}', '${context}')">♥ Add to Deck</button>`;

            if(inDeck && c.type_line?.includes('Legendary') && c.type_line?.includes('Creature')) {
                html += `<button class="action-btn" style="color:var(--special); border-color:var(--special);" onclick="setCommander('${c.id}', '${context}')">${isCmdr ? 'Unset Commander' : '👑 Set Commander'}</button>`;
            }

            document.getElementById('modalActionContainer').innerHTML = html;
            els.modal.classList.add('active');
        }

        function closeModal() { els.modal.classList.remove('active'); }
    </script>
</body>
</html>
