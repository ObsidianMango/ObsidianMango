<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Booster Vault Pocket</title>
<style>
:root{
  --bg:#121212;
  --surface:#1e1e24;
  --surface-2:#2a2a35;
  --text:#fff;
  --muted:#8b8b99;
  --line:#3b3b49;
  --primary:#ffcb05;
  --primary-dim:#c7a008;
  --danger:#eb5757;
  --success:#2ecc71;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;height:100%;overflow:hidden}
body{display:flex;flex-direction:column;user-select:none}
#dynamic-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.09;background-repeat:repeat;background-position:center;background-size:120px;filter:grayscale(100%);transition:background-image .35s ease}
#app{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;height:100%}
.view{position:absolute;inset:0 0 88px 0;display:none;flex-direction:column;overflow:hidden}
.view.active{display:flex}
#nav-bar{height:88px;background:var(--surface);display:flex;justify-content:space-around;align-items:center;border-top:1px solid #333;z-index:20;padding-bottom:24px;flex-shrink:0;box-shadow:0 -10px 30px rgba(0,0,0,.45)}
.nav-item{display:flex;flex-direction:column;align-items:center;font-size:.75rem;color:var(--muted);cursor:pointer;width:50%;transition:.2s;font-weight:700}
.nav-item.active{color:var(--primary);transform:translateY(-2px)}
.nav-icon{font-size:1.6rem;margin-bottom:4px}
.topbar{padding:12px 14px 8px;border-bottom:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0))}
h1{margin:0;font-size:1.45rem;letter-spacing:-.04em}
.subtitle{color:var(--muted);font-size:.78rem;margin-top:4px;line-height:1.25}
.controls{padding:10px 14px 6px;display:grid;gap:8px;background:rgba(0,0,0,.10)}
.segmented{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{
  background:linear-gradient(135deg,var(--primary),var(--primary-dim));color:#000;border:none;
  padding:12px 14px;border-radius:12px;font-weight:800;font-size:1rem;cursor:pointer;width:100%;
  text-align:center;box-shadow:0 4px 15px rgba(255,203,5,.2);display:inline-block;transition:transform .1s,filter .1s
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(1)}
.btn.secondary{background:var(--surface-2);color:#fff;box-shadow:none;border:1px solid #444}
.btn.danger{background:linear-gradient(135deg,#ff9d9d,#eb5757);color:#250808}
.segmented button.active{background:linear-gradient(135deg,var(--primary),var(--primary-dim));color:#000}
.segmented button:not(.active){background:var(--surface-2);color:var(--text);border:1px solid #444;box-shadow:none}
.field{display:grid;gap:6px}
.field label{font-size:.74rem;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.08em}
select,input{
  width:100%;padding:12px;background:var(--surface-2);border:1px solid #444;color:#fff;border-radius:10px;
  font-size:1rem;font-family:inherit
}
.status{padding:2px 14px 8px;color:var(--muted);min-height:18px;font-size:.81rem}
.status.good{color:var(--success)}
.status.warn{color:var(--primary)}
.status.bad{color:var(--danger)}

#view-pack .content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pack-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 14px 20px;position:relative;min-height:0}
.pack-wrapper{width:min(90vw,390px);height:min(calc(90vw*1.52),590px);max-height:590px;position:relative;animation:float 6s ease-in-out infinite;cursor:pointer;flex:0 0 auto}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.pack-shell{width:100%;height:100%;background:linear-gradient(135deg,#111,#000);border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 24px 50px rgba(0,0,0,.75);border:1px solid #444;overflow:hidden}
.pack-shell.booster-mode{background:linear-gradient(180deg,#080808,#000)}
.pack-shell.proxy-mode{background:
  radial-gradient(circle at 50% 35%, rgba(255,255,255,.10), transparent 35%),
  linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,0) 28%),
  linear-gradient(135deg,#181818,#020202)}
.pack-shell::before{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.08) 47%,rgba(255,255,255,.08) 53%,transparent 70%);background-size:200% 100%;animation:shimmer 5s infinite linear;pointer-events:none}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.pack-strip{position:absolute;top:0;left:0;right:0;height:62px;background:repeating-linear-gradient(45deg,#c00,#c00 10px,#f00 10px,#f00 20px);border-bottom:2px dashed rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;letter-spacing:.08em;z-index:2}
.pack-art{position:absolute;inset:14px 12px 16px;display:flex;align-items:center;justify-content:center;padding:0}
.pack-art img{display:block;width:auto;height:auto;max-width:100%;max-height:100%;object-fit:contain;object-position:center center;aspect-ratio:auto;filter:drop-shadow(0 0 18px rgba(0,0,0,.7))}
.pack-art.booster-art img{width:auto;height:100%;max-width:100%;max-height:100%;object-fit:contain}
.pack-art.proxy-art{padding:34px 24px 82px}
.pack-art.proxy-art img{max-width:68%;max-height:46%;object-fit:contain;opacity:.95}
.pack-meta{width:100%;max-width:390px;text-align:center;margin-top:12px;margin-bottom:0;padding:0 6px}
.pack-title{font-size:1.12rem;font-weight:900;color:var(--primary);text-transform:uppercase;line-height:1.05}
.pack-subtitle{margin-top:5px;font-size:.77rem;color:#ddd;line-height:1.25}
.hint{margin-top:8px;color:var(--muted);font-size:.76rem;text-align:center}

#view-binder .binder-shell{padding:14px;display:flex;flex-direction:column;height:100%;min-height:0}
.binder-top{display:grid;gap:10px;margin-bottom:10px}
.binder-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.binder-tabs button{padding:10px 8px}
.binder-toolbar{display:grid;grid-template-columns:1fr 130px;gap:8px}
.binder-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.summary-card{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:10px;text-align:center}
.summary-card .label{display:block;color:var(--muted);font-size:.66rem;text-transform:uppercase;font-weight:800;letter-spacing:.08em}
.summary-card .value{display:block;font-size:1rem;font-weight:900;margin-top:4px}
.pages{flex:1;overflow:auto;padding-bottom:12px}
.binder-page{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:12px;margin-bottom:12px}
.binder-page h4{margin:0 0 10px;font-size:.92rem;color:var(--primary)}
.binder-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.binder-slot{background:#151519;border:1px solid #343444;border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.shot{aspect-ratio:2.5/3.5;background:#111;display:flex;align-items:center;justify-content:center}
.shot img{width:100%;height:100%;object-fit:contain;object-position:center;background:#111;display:block;padding:2px}
.tiny{font-size:.72rem;color:var(--muted);text-align:center;padding:12px}
.txt{padding:9px;display:grid;gap:4px}
.txt strong{font-size:.82rem;line-height:1.15}
.txt .muted{color:var(--muted);font-size:.7rem;line-height:1.25}
.money{color:var(--success);font-weight:900;font-size:.82rem}
.slot-meta{display:grid;gap:4px;padding:0 9px 9px}
.slot-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 9px 9px}
.slot-actions button{padding:9px;font-size:.78rem}
.empty{padding:34px 16px;text-align:center;color:#666}
.pack-actions{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}

.modal-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.94);backdrop-filter:blur(8px);z-index:40}
.pack-modal-inner{width:100%;height:100%;display:flex;flex-direction:column;padding:12px 14px 18px}
.modal-topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.modal-chip-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;width:100%}
.modal-chip{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 8px;text-align:center}
.modal-chip .k{display:block;color:var(--muted);font-size:.66rem;text-transform:uppercase;font-weight:800;letter-spacing:.08em;margin-bottom:4px}
.modal-chip .v{display:block;font-size:.96rem;font-weight:900}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid #444;background:var(--surface-2);color:#fff;font-size:1.3rem;font-weight:900;cursor:pointer;flex:0 0 auto}
.pack-modal-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
.pack-modal-loading{display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--primary);font-weight:900;letter-spacing:.08em;min-height:220px}
.pack-modal-loading small{font-size:.78rem;color:#fff;font-weight:600}
.card-stack{width:min(92vw,420px);height:min(calc(92vw*1.52),640px);max-height:640px;position:relative;display:none;z-index:5;flex:0 0 auto}
.card{width:100%;height:100%;position:absolute;top:0;left:0;border-radius:16px;background-size:contain;background-repeat:no-repeat;background-position:center center;box-shadow:0 10px 40px rgba(0,0,0,.9);background-color:#111;border:1px solid #222;cursor:pointer}
.card::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0}
.card.sparkle::after{opacity:.7;background:linear-gradient(125deg,transparent 30%,rgba(255,255,255,.4) 50%,transparent 70%);mix-blend-mode:overlay}
.card.fly-right{animation:flyRight .55s ease-out forwards;pointer-events:none}
.card.fly-left{animation:flyLeft .55s ease-out forwards;pointer-events:none}
@keyframes flyRight{0%{transform:scale(1)}15%{transform:scale(1.06);filter:brightness(1.7)}100%{transform:translateX(180%) rotate(60deg);opacity:0}}
@keyframes flyLeft{0%{transform:scale(1)}15%{transform:scale(1.06);filter:brightness(1.7)}100%{transform:translateX(-180%) rotate(-60deg);opacity:0}}
.card-info{width:100%;max-width:520px;margin:12px auto 0;background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:12px}
.card-info h3{margin:0 0 6px;font-size:1.02rem}
.card-info p{margin:0;color:var(--muted);font-size:.86rem;line-height:1.35}
.progress-wrap{margin-top:10px}
.progress-bar{height:10px;background:#111;border-radius:999px;overflow:hidden;border:1px solid #343444}
.progress-bar span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--primary),#fff37e)}
.summary-screen{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;width:100%;height:100%}
.summary-screen h2{margin:0 0 6px;color:var(--primary)}
.summary-screen p{margin:0;color:var(--muted)}
.summary-value{font-size:1.85rem;font-weight:900;color:var(--success);margin:12px 0}
.rare-pulls{display:flex;gap:10px;overflow-x:auto;max-width:100%;padding:10px 0 16px}
.mini-card{width:72px;height:100px;border-radius:8px;background-size:contain;background-repeat:no-repeat;background-position:center center;background-color:#111;flex-shrink:0;border:1px solid #555;box-shadow:0 5px 15px rgba(0,0,0,.45)}

@media (max-width:520px){
  .binder-summary{grid-template-columns:1fr 1fr}
  .binder-toolbar{grid-template-columns:1fr 118px}
  .pack-actions{grid-template-columns:1fr}
}

/* --- CLEAN OVERRIDES --- */
.view{inset:0;}
#nav-bar{display:none !important}
.topbar.compact-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 4px;border:0;background:none}
.brand-kicker{color:var(--muted);font-size:.68rem;text-transform:uppercase;font-weight:800;letter-spacing:.12em;margin-bottom:3px}
.compact-topbar h1,.binder-modal-header h1{font-size:1.18rem;letter-spacing:-.03em;margin:0}
.icon-pill{position:relative;border:1px solid rgba(255,255,255,.10);background:var(--surface);color:#fff;border-radius:16px;height:46px;min-width:56px;padding:0 14px;font-size:1.15rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 22px rgba(0,0,0,.25)}
.badge-count{position:absolute;top:-5px;right:-5px;min-width:22px;height:22px;border-radius:999px;background:var(--primary);color:#000;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 6px;border:2px solid var(--bg)}
.compact-controls{padding:8px 14px 0;gap:10px;background:none}
.slim-segmented{gap:10px}
.slim-segmented button{padding:12px;border-radius:14px;font-size:.98rem}
.compact-controls .field{gap:0}
.compact-controls select{padding:14px 16px;border-radius:16px;font-size:1.02rem;background:#232330}
.status{min-height:0;padding:0 2px 0;font-size:.76rem;line-height:1.2}
.status:not(.warn):not(.bad){display:none}
.clean-content{overflow:visible}
.clean-pack-stage{padding:8px 16px 18px;justify-content:flex-start}
.hero-pack{width:min(88vw,420px);height:min(calc(88vw*1.5),620px);max-height:66vh;margin-top:8px}
.pack-shell{border-radius:24px;box-shadow:0 26px 60px rgba(0,0,0,.72)}
.pack-strip{height:56px;font-size:.74rem;letter-spacing:.10em}
.pack-art{inset:12px 10px 14px}
.pack-art.booster-art img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain}
.minimal-pack-meta{margin-top:12px;display:grid;gap:4px;text-align:center;max-width:92vw}
.minimal-pack-meta .pack-title{position:static;font-size:1.05rem;color:#fff;text-shadow:none;font-weight:800;line-height:1.2}
.minimal-pack-meta .pack-subtitle{color:var(--muted);font-size:.8rem;min-height:0}
.minimal-pack-meta .pack-subtitle:empty{display:none}
.binder-modal-view{display:none;position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.76);backdrop-filter:blur(10px);padding:10px}
.binder-modal-view.open{display:flex}
.binder-modal-panel{width:100%;height:100%;background:linear-gradient(180deg,#17171d,#111114);border:1px solid rgba(255,255,255,.08);border-radius:24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.binder-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px;border-bottom:1px solid rgba(255,255,255,.06)}
.compact-binder-shell{padding:12px;gap:10px}
.compact-binder-top{gap:10px;margin-bottom:8px}
.compact-binder-toolbar{grid-template-columns:1fr 120px}
.compact-binder-toolbar input,.compact-binder-toolbar select{margin:0}
.compact-binder-summary{margin-bottom:4px}
.compact-binder-actions{grid-template-columns:1fr 1fr}
.compact-import{padding:12px;border-radius:14px}
.pages{padding-bottom:18px}
.binder-page{padding:10px;border-radius:16px;margin-bottom:10px}
.binder-page h4{font-size:.82rem;margin-bottom:8px}
.binder-grid{gap:8px}
.binder-slot{border-radius:12px}
.txt strong{font-size:.78rem}
.txt .muted,.slot-meta .muted,.money{font-size:.68rem}
.modal-chip-row{grid-template-columns:repeat(2,minmax(0,1fr));justify-content:stretch;gap:8px}
.modal-chip{padding:8px 10px;border-radius:12px}
.modal-chip .k{font-size:.58rem}
.modal-chip .v{font-size:.86rem}
.pack-modal-inner{padding:10px 12px 14px}
.modal-topbar{margin-bottom:6px}
.icon-btn{width:38px;height:38px;font-size:1.2rem}
.card-info{padding:10px 2px 0}
.card-info p{display:none}
.progress-wrap{margin-top:8px}
.pack-actions{gap:8px}
.pack-actions .btn{padding:12px 10px;font-size:.9rem}
.summary-screen h2{margin:0 0 6px}
@media (max-height: 780px){
  .hero-pack{max-height:62vh}
}

/* --- DEDUPED BINDER + MINIMAL PACK MODAL OVERRIDES --- */
.pack-modal-inner.minimal-pack-modal{padding:0}
.modal-topbar,.card-info{display:none !important}
.pack-modal-stage{padding:0 0 98px}
.pack-bottom-bar{
  display:none;
  grid-template-columns:48px 1fr;
  align-items:center;
  gap:12px;
  position:absolute;
  left:12px; right:12px; bottom:12px;
  padding:10px 12px;
  background:rgba(20,20,25,.94);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  z-index:20;
}
.bottom-close-btn{width:42px;height:42px}
.bottom-progress-block{display:grid;gap:8px}
.bottom-progress-meta{display:flex;justify-content:space-between;align-items:center;gap:10px}
.bottom-progress-text,.bottom-progress-value{font-size:.88rem;font-weight:900}
.bottom-progress-value{color:var(--success)}
.bottom-progress-bar{height:12px}

.binder-modal-view{padding:0;background:rgba(0,0,0,.9)}
.binder-modal-panel{border-radius:0;border:none;box-shadow:none}
.binder-modal-header{padding:10px 12px 8px}
.compact-binder-shell{padding:10px 12px 12px}
.compact-binder-top{margin-bottom:4px}
.compact-binder-toolbar{grid-template-columns:1fr 100px}
.binder-summary{
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
  margin-bottom:8px;
}
.summary-card{padding:8px 6px;border-radius:12px}
.summary-card .label{font-size:.58rem}
.summary-card .value{font-size:.88rem}
.pages{padding-bottom:8px}
.dense-binder-page{padding:0;background:none;border:none;margin:0}
.dense-binder-grid{
  grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
  gap:8px;
}
.dense-slot{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  background:#16161c;
  border:1px solid rgba(255,255,255,.08);
}
.dense-shot{position:relative;aspect-ratio:2.5/3.5}
.dense-shot img{padding:0}
.dense-txt{padding:6px 6px 7px;gap:3px}
.dense-txt strong{
  font-size:.68rem;
  line-height:1.12;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  min-height:1.5em;
}
.dense-txt .muted,.dense-txt .money{
  font-size:.6rem;
  line-height:1.15;
}
.count-pill{
  position:absolute;
  top:6px; right:6px;
  min-width:22px; height:22px;
  border-radius:999px;
  background:rgba(0,0,0,.82);
  color:#fff;
  border:1px solid rgba(255,255,255,.14);
  display:flex; align-items:center; justify-content:center;
  font-size:.68rem; font-weight:900;
  padding:0 6px;
}
.remove-mini{
  position:absolute;
  top:6px; left:6px;
  width:22px; height:22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.82);
  color:#fff;
  font-size:.9rem;
  font-weight:900;
  z-index:3;
  cursor:pointer;
}
@media (min-width: 600px){
  .dense-binder-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}
</style>
</head>
<body>
<div id="dynamic-bg"></div>
<div id="app">
  <div id="view-pack" class="view active">
    <div class="topbar compact-topbar">
      <div class="brand-block">
        <div class="brand-kicker">Booster Vault</div>
        <h1>Open Packs</h1>
      </div>
      <button id="openBinderBtn" class="icon-pill" type="button" aria-label="Open binder">📕<span id="binderBadge" class="badge-count">0</span></button>
    </div>

    <div class="controls compact-controls">
      <div class="segmented slim-segmented">
        <button id="btnPokemon" class="active" type="button">Pokémon</button>
        <button id="btnMtg" type="button">Magic</button>
      </div>
      <div class="field">
        <select id="setSelect"><option>Loading sets...</option></select>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="content clean-content">
      <div class="pack-stage clean-pack-stage">
        <div id="packWrapper" class="pack-wrapper hero-pack" aria-label="Pack preview">
          <div id="packShell" class="pack-shell proxy-mode">
            <div class="pack-strip">TAP TO OPEN</div>
            <div id="packArtWrap" class="pack-art proxy-art"><img id="packArt" alt="Pack art"></div>
          </div>
        </div>
        <div class="pack-meta minimal-pack-meta">
          <div id="packTitle" class="pack-title">Choose a set</div>
          <div id="packSubtitle" class="pack-subtitle"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-binder" class="view binder-modal-view">
    <div class="binder-modal-panel">
      <div class="binder-modal-header">
        <div>
          <div class="brand-kicker">Collection</div>
          <h1>Binder</h1>
        </div>
        <button id="closeBinderBtn" class="icon-btn" type="button">×</button>
      </div>
      <div class="binder-shell compact-binder-shell">
        <div class="binder-top compact-binder-top">

function currency(n){ return Number(n || 0).toLocaleString(undefined, {style:'currency', currency:'USD'}); }
function setStatus(msg, tone=''){ if(!tone || tone === 'good'){ els.status.textContent = ''; els.status.className = 'status'; return; } els.status.textContent = msg; els.status.className = 'status ' + tone; }
function escapeHtml(str=''){ return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function chooseRandom(arr){ return arr && arr.length ? arr[Math.floor(Math.random() * arr.length)] : null; }
function shuffle(arr){ const out=[...arr]; for(let i=out.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [out[i],out[j]]=[out[j],out[i]]; } return out; }
async function fetchJSON(url, options={}){ const r=await fetch(url, options); if(!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.json(); }
function pokemonHeaders(){ return {}; }
function cryptoId(){ return (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`; }
function normalizeDate(dateStr){ if(!dateStr) return 0; const t = new Date(String(dateStr).replace(/\//g,'-')).getTime(); return Number.isFinite(t) ? t : 0; }
function parseCollectorNumber(value){ const match = String(value || '').match(/\d+/); return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER; }
function binderKey(card){
  return [
    String(card.game || '').toLowerCase(),
    String(card.setId || '').toLowerCase(),
    String(card.name || '').trim().toLowerCase(),
    String(card.cardNumber || '').trim().toLowerCase(),
    String(card.finishHint || '').trim().toLowerCase(),
    String(card.slotType || '').trim().toLowerCase()
  ].join('||');
}
function normalizeBinder(cards){
  const map = new Map();
  for(const rawCard of (cards || [])){
    const card = {
      uid: rawCard.uid || cryptoId(),
      game: rawCard.game || 'pokemon',
      setId: rawCard.setId || '',
      setName: rawCard.setName || '',
      name: rawCard.name || 'Unknown',
      rarity: rawCard.rarity || '',
      image: rawCard.image || '',
      value: Number(rawCard.value || 0),
      slotType: rawCard.slotType || '',
      finishHint: rawCard.finishHint || '',
      marketUrl: rawCard.marketUrl || '',
      cardNumber: rawCard.cardNumber || '',
      addedAt: rawCard.addedAt || new Date().toISOString(),
      qty: Math.max(1, Number(rawCard.qty || 1))
    };
    const key = binderKey(card);
    if(!map.has(key)){
      map.set(key, card);
      continue;
    }
    const existing = map.get(key);
    existing.qty += card.qty;
    if(normalizeDate(card.addedAt) > normalizeDate(existing.addedAt)) existing.addedAt = card.addedAt;
    if(!existing.image && card.image) existing.image = card.image;
    if(!existing.marketUrl && card.marketUrl) existing.marketUrl = card.marketUrl;
    if(Number(card.value || 0) > Number(existing.value || 0)) existing.value = Number(card.value || 0);
    if(!existing.rarity && card.rarity) existing.rarity = card.rarity;
    if(!existing.finishHint && card.finishHint) existing.finishHint = card.finishHint;
    if(!existing.slotType && card.slotType) existing.slotType = card.slotType;
    if(!existing.setName && card.setName) existing.setName = card.setName;
  }
  return [...map.values()];
}
function saveBinder(){ 
  state.binder = normalizeBinder(state.binder);
  localStorage.setItem(LS_KEYS.binder, JSON.stringify(state.binder)); 
}
function loadBinder(){ 
  try{ 
    const raw=localStorage.getItem(LS_KEYS.binder); 
    return normalizeBinder(raw ? JSON.parse(raw) : []); 
  }catch{ 
    return []; 
  } 
}

function openBinder(){ els.binderView.classList.add('open'); renderBinder(); }
function closeBinder(){ els.binderView.classList.remove('open'); }

function setGame(game){
  state.game = game;
  els.btnPokemon.classList.toggle('active', game === 'pokemon');
  els.btnMtg.classList.toggle('active', game === 'mtg');
}

async function loadSets(game){
  setStatus(`Loading ${game === 'pokemon' ? 'Pokémon' : 'MTG'} sets…`);
  if(state.allSets[game].length){ state.filteredSets = [...state.allSets[game]]; return; }

  if(game === 'pokemon'){
    const [tcgdexSets, ptcgSets] = await Promise.all([
      fetchJSON('https://api.tcgdex.net/v2/en/sets'),
      fetchJSON('https://api.pokemontcg.io/v2/sets?pageSize=250&orderBy=-releaseDate', { headers: pokemonHeaders() })
    ]);
    const ptcgMap = new Map((ptcgSets.data || []).map(set => [set.id, set]));
    state.cache.pokemonTcgSets = ptcgMap;
    state.allSets.pokemon = (tcgdexSets || []).map(set => ({
      id: set.id,
      name: set.name,
      series: set.serie?.name || ptcgMap.get(set.id)?.series || '',
      releaseDate: set.releaseDate || ptcgMap.get(set.id)?.releaseDate || '',
      logo: set.logo ? `${set.logo}.png` : (ptcgMap.get(set.id)?.images?.logo || ''),
      symbol: set.symbol ? `${set.symbol}.png` : (ptcgMap.get(set.id)?.images?.symbol || '')
    })).sort((a,b) => normalizeDate(b.releaseDate) - normalizeDate(a.releaseDate));
  } else {
    const scry = await fetchJSON('https://api.scryfall.com/sets');
    const validTypes = new Set(['core','expansion','masters','draft_innovation','commander','funny','starter','alchemy']);
    state.allSets.mtg = (scry.data || [])
      .filter(set => set.code && set.name && !set.digital && validTypes.has(set.set_type))
      .map(set => ({
        id: String(set.code).toUpperCase(),
        name: set.name,
        type: set.set_type || '',
        releaseDate: set.released_at || '',
        icon: set.icon_svg_uri || ''
      }))
      .sort((a,b) => normalizeDate(b.releaseDate) - normalizeDate(a.releaseDate));
  }
  state.filteredSets = [...state.allSets[game]];
}

async function refreshSetList(){
  const source = state.allSets[state.game] || [];
  state.filteredSets = [...source];
  const previousId = state.selectedSet?.id || '';
  const groups = new Map();
  for(const set of state.filteredSets){
    const key = state.game === 'pokemon' ? (set.series || 'Other series') : (set.type || 'Other type');
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(set);
  }
  const html = ['<option value="" disabled selected>Select expansion…</option>'];
  [...groups.entries()].forEach(([groupName, items]) => {
    html.push(`<optgroup label="${escapeHtml(groupName)}">`);
    items.forEach(set => {
      const year = set.releaseDate ? String(set.releaseDate).slice(0,4) : '';
      html.push(`<option value="${escapeHtml(set.id)}">${escapeHtml(set.name)}${year ? ` (${escapeHtml(year)})` : ''}</option>`);
    });
    html.push('</optgroup>');
  });
  els.setSelect.innerHTML = html.join('');
  if(previousId && state.filteredSets.some(set => set.id === previousId)) els.setSelect.value = previousId;
  else if(state.filteredSets.length) els.setSelect.value = state.filteredSets[0].id;
  state.selectedSet = state.filteredSets.find(set => set.id === els.setSelect.value) || null;
}

async function getPokemonSetDetail(id){
  if(state.cache.pokemonSetDetails.has(id)) return state.cache.pokemonSetDetails.get(id);
  const detail = await fetchJSON(`https://api.tcgdex.net/v2/en/sets/${encodeURIComponent(id)}`);
  state.cache.pokemonSetDetails.set(id, detail);
  return detail;
}
async function getPokemonCardsForSet(id){
  if(state.cache.pokemonCardsBySet.has(id)) return state.cache.pokemonCardsBySet.get(id);
  let page = 1;
  const all = [];
  while(true){
    const data = await fetchJSON(`https://api.pokemontcg.io/v2/cards?q=set.id:${encodeURIComponent(id)}&pageSize=250&page=${page}&orderBy=number`, { headers: pokemonHeaders() });
    all.push(...(data.data || []));
    if(!(data.page < data.totalCount / data.pageSize)) break;
    page += 1;
    if(page > 12) break;
  }
  state.cache.pokemonCardsBySet.set(id, all);
  return all;
}
async function getMtgCardsForSet(code){
  const key = String(code).toLowerCase();
  if(state.cache.mtgCardsBySet.has(key)) return state.cache.mtgCardsBySet.get(key);
  let next = `https://api.scryfall.com/cards/search?q=set%3A${encodeURIComponent(key)}+game%3Apaper+unique%3Acards&order=set`;
  const cards = [];
  let guard = 0;
  while(next && guard < 20){
    const data = await fetchJSON(next);
    cards.push(...(data.data || []));
    next = data.has_more ? data.next_page : null;
    guard += 1;
  }
  state.cache.mtgCardsBySet.set(key, cards);
  return cards;
}

function setPackPreviewMode(mode){
  const booster = mode === 'booster';
  els.packShell.classList.toggle('booster-mode', booster);
  els.packShell.classList.toggle('proxy-mode', !booster);
  els.packArtWrap.classList.toggle('booster-art', booster);
  els.packArtWrap.classList.toggle('proxy-art', !booster);
}

async function updatePreview(){
  const set = state.selectedSet;
  if(!set){
    setPackPreviewMode('proxy');
    els.packArt.src = '';
    els.packArt.style.display = 'none';
    els.packTitle.textContent = 'Choose a set';
    els.packSubtitle.textContent = '';
    els.dynamicBg.style.backgroundImage = '';
    return;
  }

  if(state.game === 'pokemon'){
    try{
      const detail = await getPokemonSetDetail(set.id);
      const boosters = Array.isArray(detail.boosters) ? detail.boosters : [];
      const pickedBooster = chooseRandom(boosters) || null;
      const boosterArt = pickedBooster?.artwork_front || '';
      const fallbackArt = detail?.logo || set.logo || set.symbol || '';
      const art = boosterArt || fallbackArt;
      if(art){
        setPackPreviewMode(boosterArt ? 'booster' : 'proxy');
        els.packArt.src = /\.(png|jpg|jpeg|webp|svg)$/i.test(art) ? art : `${art}.png`;
        els.packArt.style.display = 'block';
      } else {
        setPackPreviewMode('proxy');
        els.packArt.style.display = 'none';
      }
      els.packTitle.textContent = set.name;
      els.packSubtitle.textContent = `${set.series || 'Pokémon'}${set.releaseDate ? ' • ' + set.releaseDate : ''}`;
      if(detail?.logo){
        const bg = /\.(png|jpg|jpeg|webp|svg)$/i.test(detail.logo) ? detail.logo : `${detail.logo}.png`;
        els.dynamicBg.style.backgroundImage = `url("${bg}")`;
      } else if(set.logo) {
        els.dynamicBg.style.backgroundImage = `url("${set.logo}")`;
      } else {
        els.dynamicBg.style.backgroundImage = '';
      }
    } catch(err){
      console.warn(err);
      setPackPreviewMode('proxy');
      els.packArt.src = set.logo || set.symbol || '';
      els.packArt.style.display = els.packArt.src ? 'block' : 'none';
      els.packTitle.textContent = set.name;
      els.packSubtitle.textContent = `${set.series || 'Pokémon'}${set.releaseDate ? ' • ' + set.releaseDate : ''}`;
    }
  } else {
    setPackPreviewMode('proxy');
    els.packArt.src = set.icon || '';
    els.packArt.style.display = els.packArt.src ? 'block' : 'none';
    els.packTitle.textContent = set.name;
    els.packSubtitle.textContent = `${set.type || 'MTG set'}${set.releaseDate ? ' • ' + set.releaseDate : ''} • set proxy`;
    els.dynamicBg.style.backgroundImage = set.icon ? `url("${set.icon}")` : '';
  }
}

function clearPackStage(showStatus=false, keepModal=false){
  state.pack = [];
  state.currentIndex = -1;
  state.shownIndexes = new Set();

  els.miniProgress.textContent = '0 / 0';
  els.miniValue.textContent = currency(0);
  if(showStatus) setStatus('Current pack cleared.', 'warn');
}

function hasPokemonRarity(card, needle){ return String(card.rarity || '').toLowerCase().includes(needle); }
function hasPokemonFamily(card, family){ const r = String(card.rarity || '').toLowerCase(); return family.some(tag => r.includes(tag)); }
function estimatePokemonValue(card, finishHint){
  const priceSets = card?.tcgplayer?.prices || {};
  const order = finishHint === 'reverse'
    ? ['reverseHolofoil','holofoil','normal','1stEditionHolofoil','1stEditionNormal']
    : finishHint === 'holo-or-special'
      ? ['holofoil','reverseHolofoil','normal','1stEditionHolofoil','1stEditionNormal']
      : ['normal','holofoil','reverseHolofoil','1stEditionNormal','1stEditionHolofoil'];
  for(const key of order){
    const bucket = priceSets[key];
    if(!bucket) continue;
    const val = bucket.market ?? bucket.mid ?? bucket.low ?? bucket.high ?? bucket.directLow;
    if(Number(val) > 0) return Number(val);
  }
  return 0;
}
async function simulatePokemonPack(set){
  const cards = await getPokemonCardsForSet(set.id);
  if(!cards.length) throw new Error('No cards found for that Pokémon set.');

  const releaseYear = Number(String(set.releaseDate || '').slice(0,4)) || 0;
  const classic = releaseYear && releaseYear < 2003;
  const scarletVioletEra = releaseYear >= 2023;
  const seen = new Set();
  const pack = [];

  const buckets = {
    common: cards.filter(c => hasPokemonRarity(c, 'common')),
    uncommon: cards.filter(c => hasPokemonRarity(c, 'uncommon')),
    rare: cards.filter(c => hasPokemonFamily(c, ['rare'])),
    ultra: cards.filter(c => hasPokemonFamily(c, ['double rare','ultra rare','rare ultra','rare holo ex','rare holo gx','rare holo v','rare holo vmax','rare holo vstar','ace spec','illustration rare','special illustration rare','rare secret','rainbow','hyper rare'])),
    secret: cards.filter(c => hasPokemonFamily(c, ['secret','hyper rare','gold','rare rainbow','special illustration rare'])),
    energy: cards.filter(c => String(c.supertype || '').toLowerCase() === 'energy')
  };

  function take(list, slotType, finishHint='normal'){
    let pool = (list && list.length ? list : cards).filter(c => !seen.has(c.id));
    if(!pool.length) pool = list && list.length ? list : cards;
    const pick = chooseRandom(pool);
    if(!pick) return;
    seen.add(pick.id);
    pack.push({
      uid: cryptoId(),
      game: 'pokemon',
      setId: set.id,
      setName: set.name,
      slotType,
      finishHint,
      displayName: pick.name || 'Unknown card',
      rarity: pick.rarity || pick.supertype || 'Unknown',
      image: pick.images?.large || pick.images?.small || '',
      value: estimatePokemonValue(pick, finishHint),
      marketUrl: pick.tcgplayer?.url || '',
      raw: pick
    });
  }

  if(classic){
    for(let i=0;i<7;i++) take(buckets.common, 'Common slot');
    for(let i=0;i<3;i++) take(buckets.uncommon, 'Uncommon slot');
    take([...buckets.secret, ...buckets.ultra, ...buckets.rare], 'Rare slot', 'holo-or-special');
  } else if(scarletVioletEra){
    for(let i=0;i<4;i++) take(buckets.common, 'Common slot');
    for(let i=0;i<3;i++) take(buckets.uncommon, 'Uncommon slot');
    take(cards, 'Reverse slot', 'reverse');
    take(cards, 'Reverse / showcase slot', 'reverse');
    const rareRoll = Math.random();
    take(rareRoll < .68 ? buckets.rare : rareRoll < .92 ? buckets.ultra : buckets.secret, 'Rare+ slot', 'holo-or-special');
    if(buckets.energy.length) take(buckets.energy, 'Energy slot');
  } else {
    for(let i=0;i<5;i++) take(buckets.common, 'Common slot');
    for(let i=0;i<3;i++) take(buckets.uncommon, 'Uncommon slot');
    take(cards, 'Reverse slot', 'reverse');
    const rareRoll = Math.random();
    take(rareRoll < .74 ? buckets.rare : rareRoll < .94 ? buckets.ultra : buckets.secret, 'Rare+ slot', 'holo-or-special');
  }
  return pack;
}

function normalizeMtgRarity(r){
  const x = String(r || '').toLowerCase();
  if(x.includes('mythic')) return 'mythic';
  if(x.includes('rare')) return 'rare';
  if(x.includes('uncommon')) return 'uncommon';
  return 'common';
}
function mtgValue(card, foil=false){
  const prices = card?.prices || {};
  const picked = foil ? (prices.usd_foil ?? prices.usd ?? prices.eur) : (prices.usd ?? prices.usd_foil ?? prices.eur);
  return Number(picked || 0);
}
async function simulateMtgPack(set){
  const cards = (await getMtgCardsForSet(set.id)).filter(card => {
    const img = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal;
    return !!img;
  });
  if(!cards.length) throw new Error('No MTG cards found for that set.');

  const seen = new Set();
  const pack = [];
  const buckets = {
    common: cards.filter(c => normalizeMtgRarity(c.rarity) === 'common'),
    uncommon: cards.filter(c => normalizeMtgRarity(c.rarity) === 'uncommon'),
    rare: cards.filter(c => normalizeMtgRarity(c.rarity) === 'rare'),
    mythic: cards.filter(c => normalizeMtgRarity(c.rarity) === 'mythic'),
    land: cards.filter(c => `${c.type_line || ''}`.toLowerCase().includes('land'))
  };
  function take(list, slotType, foil=false){
    let pool = (list && list.length ? list : cards).filter(c => !seen.has(c.id));
    if(!pool.length) pool = list && list.length ? list : cards;
    const pick = chooseRandom(pool);
    if(!pick) return;
    seen.add(pick.id);
    pack.push({
      uid: cryptoId(),
      game: 'mtg',
      setId: set.id,
      setName: set.name,
      slotType,
      finishHint: foil ? 'foil' : 'nonfoil',
      displayName: pick.name || 'Unknown card',
      rarity: pick.rarity || 'Unknown',
      image: pick.image_uris?.normal || pick.image_uris?.large || pick.card_faces?.[0]?.image_uris?.normal || '',
      value: mtgValue(pick, foil),
      marketUrl: pick.purchase_uris?.tcgplayer || pick.scryfall_uri || '',
      raw: pick
    });
  }
  for(let i=0;i<10;i++) take(buckets.common, 'Common slot');
  for(let i=0;i<3;i++) take(buckets.uncommon, 'Uncommon slot');
  take(Math.random() < (1/8) && buckets.mythic.length ? buckets.mythic : buckets.rare, 'Rare / Mythic slot');
  if(Math.random() < .3){
    const foilPool = shuffle([...buckets.common, ...buckets.uncommon, ...buckets.rare, ...buckets.mythic]).filter(Boolean);
    if(foilPool.length) take(foilPool, 'Foil slot', true);
  } else if(buckets.land.length){
    take(buckets.land, 'Land slot');
  } else {
    take(buckets.common, 'Flex slot');
  }
  return pack;
}

async function preloadPackImages(pack){
  const loadImage = src => new Promise(resolve => {
    if(!src) return resolve();
    const img = new Image();
    img.onload = () => resolve();
    img.onerror = () => resolve();
    img.src = src;
  });
  await Promise.all(pack.map(entry => loadImage(entry.image)));
}

function packEntryMeta(entry){
  const market = entry.marketUrl ? ` <a href="${escapeHtml(entry.marketUrl)}" target="_blank" rel="noopener noreferrer">Market</a>.` : '';
  return `${escapeHtml(entry.rarity || 'Unknown')} • ${escapeHtml(entry.slotType || 'Slot')}${entry.finishHint ? ` • ${escapeHtml(entry.finishHint)}` : ''} • ${escapeHtml(entry.setName || '')} • ${currency(entry.value)}.${market}`;
}

function renderStack(){
  els.cardStack.innerHTML = '';
  const pack = state.pack;
  for(let i = pack.length - 1; i >= 0; i--){
    const entry = pack[i];
    const div = document.createElement('div');
    div.className = 'card';
    if(/\b(holo|secret|ultra|rare|mythic)\b/i.test(`${entry.rarity} ${entry.finishHint}`)) div.classList.add('sparkle');
    div.style.backgroundImage = `url("${entry.image || ''}")`;
    div.style.zIndex = String(pack.length - i);
    div.dataset.index = String(i);
    div.addEventListener('click', event => {
      if(Number(div.dataset.index) !== state.currentIndex) return;
      throwCurrentCard(div, event);
    });
    els.cardStack.appendChild(div);
  }
}

function updateCurrentCardUI(){
  const total = state.pack.length;
  const idx = state.currentIndex;
  if(idx < 0 || idx >= total) return;
  els.miniProgress.textContent = `${Math.min(idx + 1, total)} / ${total}`;
  els.miniValue.textContent = currency(state.runningValue);
  els.progressBar.style.width = `${((idx + 1) / total) * 100}%`;
}

function showSummary(){
  els.cardStack.style.display = 'none';
  els.summaryScreen.style.display = 'flex';
  if(!state.packStored && state.pack.length){
    addEntriesToBinder(state.pack);
    state.packStored = true;
  }
  els.summaryValue.textContent = currency(state.runningValue);
  els.summaryText.textContent = `${state.pack.length} cards opened from ${state.selectedSet?.name || 'the set'}.`;
  const highlights = state.pack.filter(entry => /\b(rare|mythic|secret|ultra|double rare|illustration)\b/i.test(entry.rarity || '')).slice(0, 10);
  els.summaryRares.innerHTML = highlights.length
    ? highlights.map(entry => `<div class="mini-card" title="${escapeHtml(entry.displayName)}" style="background-image:url('${escapeHtml(entry.image)}')"></div>`).join('')
    : '<div class="tiny">No obvious shiny nonsense stood out in this one.</div>';
}

function throwCurrentCard(cardEl, event){
  const rect = cardEl.getBoundingClientRect();
  const clickX = (event.touches?.[0]?.clientX ?? event.clientX) - rect.left;
  const dir = clickX > rect.width / 2 ? 'fly-right' : 'fly-left';
  cardEl.classList.add(dir);
  const prevIndex = state.currentIndex;
  window.setTimeout(() => {
    cardEl.remove();
    const nextIndex = prevIndex + 1;
    if(nextIndex >= state.pack.length){
      state.currentIndex = state.pack.length;
      els.miniProgress.textContent = `${state.pack.length} / ${state.pack.length}`;
      els.progressBar.style.width = '100%';
      showSummary();
      setStatus(`Pack complete: ${currency(state.runningValue)} total.`, 'good');
      return;
    }
    state.currentIndex = nextIndex;
    if(!state.shownIndexes.has(nextIndex)){
      state.shownIndexes.add(nextIndex);
      state.runningValue += Number(state.pack[nextIndex].value || 0);
    }
    updateCurrentCardUI();
    setStatus(`Revealed ${state.pack[nextIndex].displayName} — ${currency(state.pack[nextIndex].value)}.`, 'good');
  }, 520);
}

async function openPack(){
  if(!state.selectedSet){
    setStatus('Pick a set first.', 'warn');
    return;
  }
  clearPackStage(false, true);
  els.packModal.style.display = 'flex';
  els.packModalLoading.style.display = 'flex';
  els.packModalLoadingText.textContent = 'Fetching cards…';
  try{
    const pack = state.game === 'pokemon'
      ? await simulatePokemonPack(state.selectedSet)
      : await simulateMtgPack(state.selectedSet);

    els.packModalLoadingText.textContent = 'Preloading images…';
    await preloadPackImages(pack);

    state.pack = pack;
    state.currentIndex = 0;
    state.shownIndexes = new Set([0]);
    state.runningValue = Number(pack[0]?.value || 0);
    state.packStored = false;

    renderStack();
    els.packModalLoading.style.display = 'none';
    els.packBottomBar.style.display = 'grid';
    els.cardStack.style.display = 'block';
    els.summaryScreen.style.display = 'none';

    updateCurrentCardUI();
    setStatus('', '');
  }catch(err){
    console.error(err);
    els.packModalLoading.style.display = 'none';
    els.packModal.style.display = 'none';
    setStatus(`Could not open that pack. ${err.message}`, 'bad');
  }
}

function addEntriesToBinder(entries){
  const mapped = entries.map(entry => ({
    uid: cryptoId(),
    game: entry.game || state.game,
    setId: entry.setId || '',
    setName: entry.setName || state.selectedSet?.name || '',
    name: entry.displayName || entry.name || 'Unknown',
    rarity: entry.rarity || '',
    image: entry.image || '',
    value: Number(entry.value || 0),
    slotType: entry.slotType || '',
    finishHint: entry.finishHint || '',
    marketUrl: entry.marketUrl || '',
    cardNumber: entry.cardNumber || entry.raw?.number || entry.raw?.collector_number || '',
    addedAt: new Date().toISOString(),
    qty: 1
  }));
  state.binder = normalizeBinder(mapped.concat(state.binder));
  saveBinder();
  renderBinder();
}
function addWholePackToBinder(){
  if(!state.pack.length || state.packStored) return;
  addEntriesToBinder(state.pack);
  state.packStored = true;
  setStatus('', '');
}

function renderBinder(){
  const query = (els.binderSearch.value || '').trim().toLowerCase();
  const gameFilter = state.binderViewGame || 'all';
  const sortMode = state.binderSort || 'added';

  els.binderTabAll.classList.toggle('active', gameFilter === 'all');
  els.binderTabPokemon.classList.toggle('active', gameFilter === 'pokemon');
  els.binderTabMtg.classList.toggle('active', gameFilter === 'mtg');

  let filtered = state.binder.filter(card => {
    if(gameFilter !== 'all' && card.game !== gameFilter) return false;
    const hay = `${card.name} ${card.setName} ${card.rarity} ${card.slotType} ${card.cardNumber || ''}`.toLowerCase();
    return hay.includes(query);
  });

  if(sortMode === 'value'){
    filtered.sort((a,b) => Number(b.value || 0) - Number(a.value || 0) || String(a.name).localeCompare(String(b.name)));
  } else if(sortMode === 'number'){
    filtered.sort((a,b) => String(a.setName).localeCompare(String(b.setName)) || parseCollectorNumber(a.cardNumber) - parseCollectorNumber(b.cardNumber) || String(a.name).localeCompare(String(b.name)));
  } else {
    filtered.sort((a,b) => normalizeDate(b.addedAt) - normalizeDate(a.addedAt) || String(a.name).localeCompare(String(b.name)));
  }

  const shownValue = filtered.reduce((sum, card) => sum + (Number(card.value || 0) * Number(card.qty || 1)), 0);
  const shownCopies = filtered.reduce((sum, card) => sum + Number(card.qty || 1), 0);
  const allCopies = state.binder.reduce((sum, card) => sum + Number(card.qty || 1), 0);

  els.binderCount.textContent = String(filtered.length);
  els.binderValue.textContent = currency(shownValue);
  els.binderTotalCount.textContent = String(allCopies);
  if(els.binderBadge) els.binderBadge.textContent = String(allCopies);

  if(!filtered.length){
    els.binderPages.innerHTML = '<div class="empty">Nothing in this binder view yet.</div>';
    return;
  }

  els.binderPages.innerHTML = `
    <section class="binder-page dense-binder-page">
      <div class="binder-grid dense-binder-grid">
        ${filtered.map(card => `
          <article class="binder-slot dense-slot">
            <button class="remove-mini" data-remove="${escapeHtml(card.uid)}" type="button" aria-label="Remove ${escapeHtml(card.name)}">×</button>
            <div class="shot dense-shot" ${card.marketUrl ? `data-market="${escapeHtml(card.marketUrl)}"` : ''}>
              ${card.image ? `<img src="${escapeHtml(card.image)}" alt="${escapeHtml(card.name)}">` : `<div class="tiny">No image</div>`}
              ${Number(card.qty || 1) > 1 ? `<span class="count-pill">×${Number(card.qty || 1)}</span>` : ''}
            </div>
            <div class="txt dense-txt">
              <strong>${escapeHtml(card.name)}</strong>
              <span class="muted">#${escapeHtml(card.cardNumber || '—')} • ${escapeHtml(card.setName)}</span>
              <span class="money">${currency(card.value)}${Number(card.qty || 1) > 1 ? ` • stack ${currency(Number(card.value || 0) * Number(card.qty || 1))}` : ''}</span>
            </div>
          </article>
        `).join('')}
      </div>
    </section>
  `;
}

function exportBinderJSON(){
  const blob = new Blob([JSON.stringify(state.binder, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'booster-vault-pocket-binder.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setStatus('', '');
}
async function importBinderJSON(event){
  const file = event.target.files?.[0];
  if(!file) return;
  try{
    const text = await file.text();
    const incoming = JSON.parse(text);
    if(!Array.isArray(incoming)) throw new Error('JSON must contain an array of cards.');
    state.binder = normalizeBinder(incoming.concat(state.binder).map(card => ({
      uid: card.uid || cryptoId(),
      game: card.game || 'pokemon',
      setId: card.setId || '',
      setName: card.setName || '',
      name: card.name || 'Unknown',
      rarity: card.rarity || '',
      image: card.image || '',
      value: Number(card.value || 0),
      slotType: card.slotType || '',
      finishHint: card.finishHint || '',
      marketUrl: card.marketUrl || '',
      cardNumber: card.cardNumber || '',
      addedAt: card.addedAt || new Date().toISOString(),
      qty: Math.max(1, Number(card.qty || 1))
    })));
    saveBinder();
    renderBinder();
    openBinder();
    setStatus('', '');
  }catch(err){
    console.error(err);
    setStatus(`Could not import binder JSON. ${err.message}`, 'bad');
  }finally{
    event.target.value = '';
  }
}

function bindEvents(){
  els.btnPokemon.addEventListener('click', async () => {
    if(state.game === 'pokemon') return;
    setGame('pokemon');
    await loadSets('pokemon');
    await refreshSetList();
    await updatePreview();
    clearPackStage(false);
    setStatus('', '');
  });
  els.btnMtg.addEventListener('click', async () => {
    if(state.game === 'mtg') return;
    setGame('mtg');
    await loadSets('mtg');
    await refreshSetList();
    await updatePreview();
    clearPackStage(false);
    setStatus('', '');
  });

  els.setSelect.addEventListener('change', async () => {
    state.selectedSet = state.filteredSets.find(set => set.id === els.setSelect.value) || null;
    clearPackStage(false);
    await updatePreview();
    if(state.selectedSet) setStatus('', '');
  });

  els.packWrapper.addEventListener('click', openPack);
  els.closePackModalBtn.addEventListener('click', () => clearPackStage(false, false));
  els.packModal.addEventListener('click', event => {
    if(event.target === els.packModal) clearPackStage(false, false);
  });

  els.openAnotherBtn.addEventListener('click', () => {
    clearPackStage(false, true);
    openPack();
  });

  els.openBinderBtn.addEventListener('click', openBinder);
  els.closeBinderBtn.addEventListener('click', closeBinder);
  els.binderView.addEventListener('click', event => { if(event.target === els.binderView) closeBinder(); });
  els.binderSearch.addEventListener('input', renderBinder);
  els.binderSort.addEventListener('change', () => {
    state.binderSort = els.binderSort.value;
    renderBinder();
  });
  els.binderTabAll.addEventListener('click', () => { state.binderViewGame = 'all'; renderBinder(); });
  els.binderTabPokemon.addEventListener('click', () => { state.binderViewGame = 'pokemon'; renderBinder(); });
  els.binderTabMtg.addEventListener('click', () => { state.binderViewGame = 'mtg'; renderBinder(); });

  els.exportBinderBtn.addEventListener('click', exportBinderJSON);
  if(els.importBinderInput) els.importBinderInput.addEventListener('change', importBinderJSON);
  els.clearBinderBtn.addEventListener('click', () => {
    if(!confirm('Clear the whole binder stored in this browser?')) return;
    state.binder = [];
    saveBinder();
    renderBinder();
    setStatus('Binder cleared. The cardboard graveyard is empty again.', 'warn');
  });
  els.binderPages.addEventListener('click', event => {
    const removeBtn = event.target.closest('[data-remove]');
    if(removeBtn){
      const uid = removeBtn.getAttribute('data-remove');
      state.binder = state.binder.flatMap(card => {
        if(card.uid !== uid) return [card];
        const nextQty = Math.max(0, Number(card.qty || 1) - 1);
        if(nextQty <= 0) return [];
        return [{ ...card, qty: nextQty }];
      });
      saveBinder();
      renderBinder();
      setStatus('Removed one copy from binder.', 'warn');
      return;
    }
    const marketBtn = event.target.closest('[data-market]');
    if(marketBtn){
      const url = marketBtn.getAttribute('data-market');
      if(url) window.open(url, '_blank', 'noopener');
    }
  });
}

async function init(){
  state.binder = loadBinder();
  bindEvents();
  setGame('pokemon');
  await loadSets('pokemon');
  await refreshSetList();
  await updatePreview();
  clearPackStage(false);
  els.binderSort.value = state.binderSort;
  renderBinder();
  setStatus('', '');
}
init();
</script>
</body>
</html>
