<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Fate Forge</title>

<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background: #050505;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 16px;
    background:
      radial-gradient(circle at top, #3b3b3b 0%, #151515 42%, #050505 100%);
  }

  .app {
    width: 100%;
    max-width: 450px;
  }

  h1 {
    margin: 8px 0 4px;
    text-align: center;
    font-size: 34px;
    line-height: 1;
  }

  .subtitle {
    text-align: center;
    color: #aaa;
    font-size: 15px;
    margin-bottom: 14px;
  }

  .card {
    background: rgba(255,255,255,0.075);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 28px;
    padding: 14px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.55);
    overflow: hidden;
  }

  .tray-wrap {
    position: relative;
    height: 260px;
    border-radius: 24px;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 25%, rgba(255,255,255,0.16), transparent 28%),
      radial-gradient(circle at center, #222 0%, #101010 62%, #060606 100%);
    border: 1px solid rgba(255,255,255,0.12);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .tap-hint {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 9px;
    text-align: center;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    pointer-events: none;
  }

  .result {
    text-align: center;
    padding: 12px 6px 4px;
  }

  #bigResult {
    font-size: 58px;
    font-weight: 950;
    line-height: 1;
    letter-spacing: -2px;
  }

  #detail {
    min-height: 22px;
    color: #cfcfcf;
    margin-top: 7px;
    font-size: 15px;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    margin-top: 13px;
  }

  button {
    border: 0;
    border-radius: 18px;
    padding: 16px 7px;
    font-size: 17px;
    font-weight: 850;
    color: white;
    background: linear-gradient(145deg, #444, #222);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      0 8px 18px rgba(0,0,0,0.35);
    cursor: pointer;
  }

  button:active {
    transform: scale(0.96);
    filter: brightness(1.25);
  }

  .coin {
    background: linear-gradient(145deg, #d4a537, #6d4b09);
  }

  .hot {
    background: linear-gradient(145deg, #8a3333, #300808);
  }

  .utility {
    background: linear-gradient(145deg, #303d66, #121829);
  }

  .custom-box {
    margin-top: 13px;
    background: rgba(255,255,255,0.075);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 22px;
    padding: 12px;
  }

  .custom-row {
    display: grid;
    grid-template-columns: 1fr 1fr 92px;
    gap: 9px;
  }

  input {
    min-width: 0;
    border: 0;
    border-radius: 16px;
    padding: 15px 10px;
    font-size: 17px;
    background: #0b0b0b;
    color: white;
    outline: 1px solid rgba(255,255,255,0.16);
  }

  .mini-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    margin-top: 9px;
  }

  .history {
    margin-top: 13px;
    background: rgba(255,255,255,0.055);
    border-radius: 20px;
    padding: 13px;
    max-height: 170px;
    overflow-y: auto;
  }

  .history h2 {
    margin: 0 0 8px;
    font-size: 17px;
  }

  #historyList {
    display: flex;
    flex-direction: column;
    gap: 6px;
    color: #ddd;
    font-size: 14px;
  }
</style>
</head>

<body>
<main class="app">
  <h1>Fate Forge</h1>
  <div class="subtitle">Coin flip, D3, D4, D6, D8, D10, D12, D20, D100</div>

  <section class="card">
    <div class="tray-wrap" id="trayWrap">
      <canvas id="tray"></canvas>
      <div class="tap-hint">tap the forge to reroll</div>
    </div>

    <div class="result">
      <div id="bigResult">—</div>
      <div id="detail">Choose a die, g slice.</div>
    </div>
  </section>

  <section class="controls">
    <button class="coin" onclick="rollCoin()">Coin</button>
    <button onclick="rollDice(3)">D3</button>
    <button onclick="rollDice(4)">D4</button>
    <button onclick="rollDice(6)">D6</button>
    <button onclick="rollDice(8)">D8</button>
    <button onclick="rollDice(10)">D10</button>
    <button onclick="rollDice(12)">D12</button>
    <button onclick="rollDice(20)">D20</button>
    <button onclick="rollDice(100)">D100</button>
  </section>

  <section class="custom-box">
    <div class="custom-row">
      <input id="diceCount" type="number" min="1" max="99" value="1" placeholder="Qty" />
      <input id="diceSides" type="number" min="2" max="9999" placeholder="Sides" />
      <button onclick="rollCustom()">Roll</button>
    </div>

    <div class="mini-row">
      <button class="utility" id="soundBtn" onclick="toggleSound()">Sound: On</button>
      <button class="utility" id="shakeBtn" onclick="enableShake()">Shake: Off</button>
    </div>
  </section>

  <section class="history">
    <h2>History</h2>
    <div id="historyList"></div>
  </section>

  <br />

  <button class="hot" style="width:100%;" onclick="clearHistory()">Clear History</button>
</main>

<script>
  const canvas = document.getElementById("tray");
  const ctx = canvas.getContext("2d");
  const trayWrap = document.getElementById("trayWrap");
  const bigResult = document.getElementById("bigResult");
  const detail = document.getElementById("detail");
  const historyList = document.getElementById("historyList");
  const soundBtn = document.getElementById("soundBtn");
  const shakeBtn = document.getElementById("shakeBtn");

  let W = 0;
  let H = 0;
  let DPR = 1;

  let dice = [];
  let particles = [];
  let shockwaves = [];
  let rolling = false;
  let rollStart = 0;
  let rollDuration = 1300;
  let lastTime = performance.now();
  let lastRoll = { type: "die", sides: 20, count: 1 };
  let soundOn = true;
  let audioCtx = null;
  let shakeOn = false;
  let lastShakeTime = 0;
  let screenShake = 0;

  const shapeMap = {
    3: "triangle",
    4: "tetra",
    6: "cube",
    8: "diamond",
    10: "pentagon",
    12: "hexagon",
    20: "crystal",
    100: "decagon"
  };

  function resizeCanvas() {
    const rect = trayWrap.getBoundingClientRect();
    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    W = Math.floor(rect.width);
    H = Math.floor(rect.height);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    if (!rolling && dice.length === 0) {
      dice = [makeIdleDie()];
    }
  }

  function makeIdleDie() {
    return {
      x: W / 2,
      y: H / 2 - 8,
      vx: 0,
      vy: 0,
      size: 92,
      rot: -0.2,
      omega: 0,
      sides: 20,
      shape: "crystal",
      value: "?",
      finalValue: "?",
      type: "die",
      settled: true,
      tempTimer: 0,
      glow: 0,
      flip3D: 0,
      flipSpeed: 0
    };
  }

  function fairInt(max) {
    if (!window.crypto || !crypto.getRandomValues) {
      return Math.floor(Math.random() * max) + 1;
    }

    const range = 4294967296;
    const limit = Math.floor(range / max) * max;
    const a = new Uint32Array(1);
    let x;

    do {
      crypto.getRandomValues(a);
      x = a[0];
    } while (x >= limit);

    return (x % max) + 1;
  }

  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  }

  function playTone(freq, duration, gain = 0.06, type = "triangle") {
    if (!soundOn) return;
    unlockAudio();

    const osc = audioCtx.createOscillator();
    const vol = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

    vol.gain.setValueAtTime(0, audioCtx.currentTime);
    vol.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 0.006);
    vol.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

    osc.connect(vol);
    vol.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function clack(power = 1) {
    playTone(110 + Math.random() * 140, 0.045, 0.035 * power, "square");
  }

  function finalThud() {
    playTone(62, 0.12, 0.11, "sine");
    setTimeout(() => playTone(190, 0.08, 0.04, "triangle"), 40);
  }

  function buzz(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  function toggleSound() {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? "Sound: On" : "Sound: Off";

    if (soundOn) {
      unlockAudio();
      playTone(440, 0.08, 0.04);
    }
  }

  async function enableShake() {
    try {
      if (
        typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function"
      ) {
        const permission = await DeviceMotionEvent.requestPermission();
        if (permission !== "granted") return;
      }

      if (!shakeOn) {
        window.addEventListener("devicemotion", handleMotion);
        shakeOn = true;
        shakeBtn.textContent = "Shake: On";
      } else {
        window.removeEventListener("devicemotion", handleMotion);
        shakeOn = false;
        shakeBtn.textContent = "Shake: Off";
      }
    } catch (e) {
      shakeBtn.textContent = "Shake unavailable";
    }
  }

  function handleMotion(e) {
    const a = e.accelerationIncludingGravity;
    if (!a) return;

    const force = Math.abs(a.x || 0) + Math.abs(a.y || 0) + Math.abs(a.z || 0);
    const now = Date.now();

    if (force > 34 && now - lastShakeTime > 850) {
      lastShakeTime = now;
      rerollLast();
    }
  }

  function makeTargets(count) {
    const targets = [];
    const shown = Math.min(count, 10);
    const cols = shown <= 1 ? 1 : shown <= 4 ? 2 : shown <= 6 ? 3 : 5;
    const rows = Math.ceil(shown / cols);
    const gapX = W / (cols + 1);
    const gapY = H / (rows + 1);

    for (let i = 0; i < shown; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);

      targets.push({
        x: gapX * (col + 1),
        y: gapY * (row + 1) - 4
      });
    }

    return targets;
  }

  function rollDice(sides, count = 1) {
    lastRoll = { type: "die", sides, count };
    startRoll({ type: "die", sides, count });
  }

  function rollCoin() {
    lastRoll = { type: "coin", sides: 2, count: 1 };
    startRoll({ type: "coin", sides: 2, count: 1 });
  }

  function rollCustom() {
    const count = parseInt(document.getElementById("diceCount").value, 10);
    const sides = parseInt(document.getElementById("diceSides").value, 10);

    if (!count || count < 1 || !sides || sides < 2) {
      bigResult.textContent = "Nope";
      detail.textContent = "Enter quantity and sides.";
      buzz([70]);
      screenShake = 8;
      return;
    }

    rollDice(sides, count);
  }

  function rerollLast() {
    if (lastRoll.type === "coin") {
      rollCoin();
    } else {
      rollDice(lastRoll.sides, lastRoll.count);
    }
  }

  function startRoll(config) {
    unlockAudio();

    const count = Math.max(1, Math.min(99, config.count || 1));
    const shown = Math.min(count, 10);
    const targets = makeTargets(shown);
    const results = [];
    let total = 0;

    for (let i = 0; i < count; i++) {
      const r = config.type === "coin"
        ? (fairInt(2) === 1 ? "Heads" : "Tails")
        : fairInt(config.sides);

      results.push(r);

      if (typeof r === "number") {
        total += r;
      }
    }

    dice = [];
    particles = [];
    shockwaves = [];
    rolling = true;
    rollStart = performance.now();

    rollDuration = config.type === "coin"
      ? 1650
      : 1250 + Math.min(shown, 8) * 65;

    screenShake = config.type === "coin" ? 6 : 10;

    const baseSize = config.type === "coin"
      ? 118
      : shown <= 1 ? 104 : shown <= 4 ? 78 : shown <= 6 ? 66 : 54;

    for (let i = 0; i < shown; i++) {
      const sideStart = Math.random() < 0.5 ? -1 : 1;

      dice.push({
        x: W / 2 + (Math.random() * 40 - 20),
        y: config.type === "coin" ? H / 2 + 60 : -40 - Math.random() * 80,
        vx: config.type === "coin" ? 0 : sideStart * (220 + Math.random() * 280),
        vy: config.type === "coin" ? -720 : 220 + Math.random() * 150,
        size: baseSize,
        rot: Math.random() * Math.PI,
        omega: config.type === "coin" ? 28 : sideStart * (8 + Math.random() * 12),
        flip3D: 0,
        flipSpeed: config.type === "coin" ? 38 : 0,
        sides: config.sides,
        shape: config.type === "coin" ? "coin" : getShape(config.sides),
        value: config.type === "coin" ? "?" : fairInt(config.sides),
        finalValue: config.type === "coin"
          ? (results[0] === "Heads" ? "H" : "T")
          : results[i],
        type: config.type,
        targetX: targets[i].x,
        targetY: targets[i].y,
        settled: false,
        tempTimer: 0,
        glow: 0
      });
    }

    bigResult.textContent = config.type === "coin" ? "Fate Flip" : "Rolling";

    detail.textContent = config.type === "coin"
      ? "The coin enters the Fate Flip..."
      : count === 1
        ? "Rolling a D" + config.sides + "..."
        : "Rolling " + count + "D" + config.sides + "...";

    playTone(320, 0.06, 0.035);
    buzz([18, 25, 18]);

    setTimeout(() => finishRoll(config, results, total), rollDuration);
  }

  function finishRoll(config, results, total) {
    rolling = false;
    screenShake = config.type === "coin" ? 10 : 16;
    finalThud();
    buzz([25, 35, 45]);

    for (const d of dice) {
      d.x = d.targetX || W / 2;
      d.y = d.targetY || H / 2;
      d.vx = 0;
      d.vy = 0;
      d.omega = 0;
      d.flipSpeed = 0;
      d.flip3D = 0;
      d.value = d.finalValue;
      d.glow = 1;
      d.settled = true;
      spawnBurst(d.x, d.y, d.size);
      shockwaves.push({ x: d.x, y: d.y, r: 8, life: 1 });
    }

    if (config.type === "coin") {
      bigResult.textContent = results[0];
      detail.textContent = "Fate Flip complete.";
      addHistory("Fate Flip: " + results[0]);
      return;
    }

    if (results.length === 1) {
      bigResult.textContent = results[0];
      detail.textContent = "Rolled a D" + config.sides;
      addHistory("D" + config.sides + ": " + results[0]);
    } else {
      bigResult.textContent = total;
      detail.textContent =
        results.length + "D" + config.sides + " → " + results.join(", ");
      addHistory(
        results.length + "D" + config.sides + ": " + total + " [" + results.join(", ") + "]"
      );
    }
  }

  function getShape(sides) {
    return shapeMap[sides] || "custom";
  }

  function update(dt, now) {
    screenShake *= 0.88;

    for (const d of dice) {
      if (rolling) {
        d.tempTimer += dt;

        if (d.tempTimer > 0.055) {
          d.tempTimer = 0;

          if (d.type === "coin") {
            d.value = Math.random() < 0.5 ? "H" : "T";
          } else {
            d.value = fairInt(d.sides);
          }
        }

        if (d.type === "coin") {
          const progress = Math.min(1, (now - rollStart) / rollDuration);
          const arc = Math.sin(progress * Math.PI);

          d.x = W / 2 + Math.sin(progress * Math.PI * 2) * 18;
          d.y = H / 2 + 72 - arc * 166;

          d.flip3D += d.flipSpeed * dt;
          d.rot += d.omega * dt;

          if (progress > 0.78) {
            const settle = (progress - 0.78) / 0.22;
            d.flipSpeed *= 0.9;
            d.omega *= 0.92;
            d.y += settle * settle * 55;
          }
        } else {
          d.vy += 1600 * dt;
          d.x += d.vx * dt;
          d.y += d.vy * dt;
          d.rot += d.omega * dt;

          const r = d.size * 0.55;
          const floor = H - r - 12;

          if (d.x < r) {
            d.x = r;
            d.vx *= -0.72;
            d.omega *= -0.75;
            clack(0.8);
          }

          if (d.x > W - r) {
            d.x = W - r;
            d.vx *= -0.72;
            d.omega *= -0.75;
            clack(0.8);
          }

          if (d.y > floor) {
            d.y = floor;
            d.vy *= -0.56;
            d.vx *= 0.86;
            d.omega *= 0.8;
            clack(1);
            spawnDust(d.x, d.y + r * 0.6, d.size);
          }

          const progress = Math.min(1, (now - rollStart) / rollDuration);

          if (progress > 0.68) {
            const pull = (progress - 0.68) / 0.32;
            const ease = 1 - Math.pow(1 - pull, 3);
            d.x += ((d.targetX || W / 2) - d.x) * ease * 0.07;
            d.y += ((d.targetY || H / 2) - d.y) * ease * 0.07;
            d.vx *= 0.92;
            d.vy *= 0.92;
            d.omega *= 0.92;
          }
        }
      }

      d.glow *= 0.93;
    }

    for (const p of particles) {
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 500 * dt;
      p.rot += p.spin * dt;
    }

    particles = particles.filter(p => p.life > 0);

    for (const s of shockwaves) {
      s.r += 220 * dt;
      s.life -= dt * 1.6;
    }

    shockwaves = shockwaves.filter(s => s.life > 0);
  }

  function draw() {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;

    ctx.clearRect(0, 0, W, H);
    drawTrayBackground(sx, sy);

    for (const s of shockwaves) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, s.life) * 0.55;
      ctx.strokeStyle = "rgba(255,255,255,0.8)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(s.x + sx, s.y + sy, s.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    for (const d of dice) {
      drawDie(d, sx, sy);
    }

    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.translate(p.x + sx, p.y + sy);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    }

    drawVignette();
  }

  function drawTrayBackground(sx, sy) {
    ctx.save();
    ctx.translate(sx * 0.25, sy * 0.25);

    const g = ctx.createRadialGradient(W * 0.5, H * 0.36, 20, W * 0.5, H * 0.5, W * 0.75);
    g.addColorStop(0, "#353535");
    g.addColorStop(0.52, "#151515");
    g.addColorStop(1, "#050505");

    ctx.fillStyle = g;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = "white";
    ctx.lineWidth = 1;

    for (let x = -60; x < W + 60; x += 38) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + 80, H);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawVignette() {
    const g = ctx.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, W * 0.72);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.48)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawDie(d, sx, sy) {
    const s = d.size;
    const x = d.x + sx;
    const y = d.y + sy;

    ctx.save();

    ctx.globalAlpha = 0.45;
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.ellipse(x, y + s * 0.56, s * 0.48, s * 0.13, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(d.rot);

    let coinSquash = 1;
    let displayValue = d.value;

    if (d.type === "coin") {
      coinSquash = Math.abs(Math.cos(d.flip3D || 0));
      coinSquash = Math.max(0.08, coinSquash);
      ctx.scale(coinSquash, 1);

      if (rolling) {
        displayValue = Math.cos(d.flip3D || 0) < 0 ? "T" : "H";
      }
    }

    if (d.glow > 0.02) {
      ctx.save();
      ctx.globalAlpha = d.glow * 0.7;
      ctx.shadowColor = "white";
      ctx.shadowBlur = 35;
      drawShapePath(d.shape, s * 0.58);
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.fill();
      ctx.restore();
    }

    const grad = ctx.createLinearGradient(-s, -s, s, s);

    if (d.type === "coin") {
      grad.addColorStop(0, "#fff4a8");
      grad.addColorStop(0.42, "#d59f25");
      grad.addColorStop(1, "#6e4403");
    } else {
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.45, "#d9d9d9");
      grad.addColorStop(1, "#777777");
    }

    drawShapePath(d.shape, s * 0.58);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.lineWidth = Math.max(2, s * 0.035);
    ctx.strokeStyle = d.type === "coin"
      ? "rgba(255,226,122,0.95)"
      : "rgba(255,255,255,0.85)";
    ctx.stroke();

    if (d.type === "coin" && coinSquash < 0.18) {
      ctx.save();
      ctx.strokeStyle = "rgba(255,238,158,0.95)";
      ctx.lineWidth = s * 0.14;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.55);
      ctx.lineTo(0, s * 0.55);
      ctx.stroke();
      ctx.restore();
    } else {
      drawFacets(d.shape, s * 0.58);

      if (d.sides === 6 && d.type !== "coin" && Number(displayValue) >= 1 && Number(displayValue) <= 6) {
        drawPips(Number(displayValue), s);
      } else {
        drawValueText(displayValue, s, d.type);
      }
    }

    ctx.restore();
  }

  function drawShapePath(shape, r) {
    ctx.beginPath();

    if (shape === "coin") {
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      return;
    }

    if (shape === "cube") {
      roundRectPath(-r, -r, r * 2, r * 2, r * 0.24);
      return;
    }

    const points = getPoints(shape, r);
    ctx.moveTo(points[0].x, points[0].y);

    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }

    ctx.closePath();
  }

  function roundRectPath(x, y, w, h, rad) {
    ctx.moveTo(x + rad, y);
    ctx.lineTo(x + w - rad, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
    ctx.lineTo(x + w, y + h - rad);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    ctx.lineTo(x + rad, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
    ctx.lineTo(x, y + rad);
    ctx.quadraticCurveTo(x, y, x + rad, y);
  }

  function getPoints(shape, r) {
    if (shape === "triangle") {
      return poly(3, r, -Math.PI / 2);
    }

    if (shape === "tetra") {
      return [
        { x: 0, y: -r },
        { x: r * 0.95, y: r * 0.78 },
        { x: 0, y: r },
        { x: -r * 0.95, y: r * 0.78 }
      ];
    }

    if (shape === "diamond") {
      return [
        { x: 0, y: -r },
        { x: r, y: 0 },
        { x: 0, y: r },
        { x: -r, y: 0 }
      ];
    }

    if (shape === "pentagon") {
      return poly(5, r, -Math.PI / 2);
    }

    if (shape === "hexagon") {
      return poly(6, r, -Math.PI / 6);
    }

    if (shape === "decagon") {
      return poly(10, r, -Math.PI / 2);
    }

    if (shape === "crystal") {
      return [
        { x: 0, y: -r },
        { x: r * 0.82, y: -r * 0.42 },
        { x: r, y: r * 0.2 },
        { x: r * 0.45, y: r },
        { x: -r * 0.45, y: r },
        { x: -r, y: r * 0.2 },
        { x: -r * 0.82, y: -r * 0.42 }
      ];
    }

    return poly(7, r, -Math.PI / 2);
  }

  function poly(n, r, offset) {
    const points = [];

    for (let i = 0; i < n; i++) {
      const a = offset + i * Math.PI * 2 / n;

      points.push({
        x: Math.cos(a) * r,
        y: Math.sin(a) * r
      });
    }

    return points;
  }

  function drawFacets(shape, r) {
    if (shape === "coin") {
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.72, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      return;
    }

    const points = shape === "cube"
      ? [
          { x: -r, y: -r },
          { x: r, y: -r },
          { x: r, y: r },
          { x: -r, y: r }
        ]
      : getPoints(shape, r);

    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = 1.5;

    for (const p of points) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    ctx.restore();

    ctx.save();
    ctx.globalAlpha = 0.13;
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(points[0].x, points[0].y);
    ctx.lineTo(points[1].x, points[1].y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawValueText(value, s, type) {
    const text = String(value);
    const len = text.length;

    ctx.save();
    ctx.fillStyle = type === "coin" ? "#2a1600" : "#111";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "950 " + Math.max(18, s * (len <= 1 ? 0.54 : len <= 2 ? 0.47 : 0.36)) + "px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.shadowColor = "rgba(255,255,255,0.55)";
    ctx.shadowBlur = 3;
    ctx.fillText(text, 0, 3);
    ctx.restore();
  }

  function drawPips(value, s) {
    const spots = {
      1: [[0, 0]],
      2: [[-0.28, -0.28], [0.28, 0.28]],
      3: [[-0.3, -0.3], [0, 0], [0.3, 0.3]],
      4: [[-0.3, -0.3], [0.3, -0.3], [-0.3, 0.3], [0.3, 0.3]],
      5: [[-0.32, -0.32], [0.32, -0.32], [0, 0], [-0.32, 0.32], [0.32, 0.32]],
      6: [[-0.32, -0.34], [0.32, -0.34], [-0.32, 0], [0.32, 0], [-0.32, 0.34], [0.32, 0.34]]
    };

    ctx.save();
    ctx.fillStyle = "#111";

    for (const p of spots[value]) {
      ctx.beginPath();
      ctx.arc(p[0] * s, p[1] * s, s * 0.07, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function spawnDust(x, y, size) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x,
        y,
        vx: (Math.random() - 0.5) * 130,
        vy: -Math.random() * 90,
        size: 2 + Math.random() * 4,
        life: 0.25 + Math.random() * 0.2,
        maxLife: 0.45,
        rot: Math.random() * Math.PI,
        spin: (Math.random() - 0.5) * 8,
        color: "rgba(255,255,255,0.55)"
      });
    }
  }

  function spawnBurst(x, y, size) {
    for (let i = 0; i < 38; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 360;

      particles.push({
        x,
        y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - 110,
        size: 2 + Math.random() * 5,
        life: 0.45 + Math.random() * 0.45,
        maxLife: 0.9,
        rot: Math.random() * Math.PI,
        spin: (Math.random() - 0.5) * 12,
        color: Math.random() < 0.55
          ? "rgba(255,255,255,0.9)"
          : "rgba(255,215,120,0.9)"
      });
    }
  }

  function addHistory(text) {
    const item = document.createElement("div");

    item.textContent = new Date().toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    }) + " — " + text;

    historyList.prepend(item);
  }

  function clearHistory() {
    historyList.innerHTML = "";
    bigResult.textContent = "—";
    detail.textContent = "History cleared.";
    dice = [makeIdleDie()];
    screenShake = 8;
    buzz([20]);
  }

  function frame(now) {
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    update(dt, now);
    draw();
    requestAnimationFrame(frame);
  }

  trayWrap.addEventListener("click", rerollLast);
  window.addEventListener("resize", resizeCanvas);

  resizeCanvas();
  requestAnimationFrame(frame);
</script>
</body>
</html>
